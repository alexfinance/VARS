        const today = new Date();
        const todayStr = today.toISOString().slice(0,10);
        const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r.toISOString().slice(0,10); };

        // Apply type filter
        let filteredVisitors = resVisFilter === 'All' ? allVisitors : allVisitors.filter(v => v.type === resVisFilter);

        // Apply date range filter
        if (resVisDateFilter !== 'All') {
          filteredVisitors = filteredVisitors.filter(v => {
            const vd = parseVisDate(v.date);
            if (!vd) return false;
            if (resVisDateFilter === 'Today') return vd === todayStr;
            if (resVisDateFilter === 'Next Week') return vd >= todayStr && vd <= addDays(today, 7);
            if (resVisDateFilter === 'Next Month') return vd >= todayStr && vd <= addDays(today, 30);
            if (resVisDateFilter === 'Past Week') return vd < todayStr && vd >= addDays(today, -7);
            if (resVisDateFilter === 'Past Month') return vd < todayStr && vd >= addDays(today, -30);
            return true;
          });
        }

        // Group by date
        const grouped = {};
        filteredVisitors.forEach(v => {
          const key = parseVisDate(v.date) || 'Unknown';
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(v);
        });

        // Sort: Today first, then future dates ascending, then past dates descending
        const sortedDateKeys = Object.keys(grouped).sort((a, b) => {
          const aIsToday = a === todayStr;
          const bIsToday = b === todayStr;
          const aIsFuture = a > todayStr;
          const bIsFuture = b > todayStr;
          if (aIsToday && !bIsToday) return -1;
          if (!aIsToday && bIsToday) return 1;
          if (aIsFuture && bIsFuture) return a.localeCompare(b); // future ascending
          if (aIsFuture && !bIsFuture) return -1; // future before past
          if (!aIsFuture && bIsFuture) return 1;
          return b.localeCompare(a); // past descending (most recent first)
        });

        // Find where past starts for separator
        const firstPastIdx = sortedDateKeys.findIndex(k => k < todayStr);

        const formatDateLabel = (key) => {
          if (key === todayStr) return 'Today';
          const yd = addDays(today, -1);
          if (key === yd) return 'Yesterday';
          const tmr = addDays(today, 1);
          if (key === tmr) return 'Tomorrow';
          const parts = key.split('-');
          if (parts.length === 3) return parts[2] + '-' + parts[1] + '-' + parts[0];
          return key;
        };

        return (
          <div className="res-content" style={{padding:'12px 16px',paddingBottom:80}}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:600,color:'#1a1a1a'}}>Visitors</div>
              <div style={{position:'relative'}}>
                <button onClick={() => setResVisFilterOpen(!resVisFilterOpen)} style={{background:'none',border:'1px solid #d0d0d0',borderRadius:6,padding:'6px 14px',fontSize:12,color:'#555',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
                  Filter
                </button>
                {resVisFilterOpen && (
                  <div style={{position:'absolute',top:36,right:0,background:'#fff',border:'1px solid #e0e0e0',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,0.1)',zIndex:100,minWidth:200,overflow:'hidden'}}>
                    <div style={{padding:'10px 14px',fontSize:11,color:'#888',borderBottom:'1px solid #f0f0f0',fontWeight:600}}>Visitor Type</div>
                    {visFilterTypes.map(t => (
                      <div key={t} onClick={() => { setResVisFilter(t); if (resVisDateFilter !== 'All') setResVisFilterOpen(true); else setResVisFilterOpen(false); }}
                        style={{padding:'9px 14px',fontSize:13,color: resVisFilter === t ? '#1a1a1a' : '#555',fontWeight: resVisFilter === t ? 600 : 400,cursor:'pointer',background: resVisFilter === t ? '#f5f5f5' : '#fff'}}>
                        {t}
                      </div>
                    ))}
                    <div style={{padding:'10px 14px',fontSize:11,color:'#888',borderBottom:'1px solid #f0f0f0',borderTop:'1px solid #f0f0f0',fontWeight:600}}>Date Range</div>
                    {visDateFilterOptions.map(d => (
                      <div key={d} onClick={() => { setResVisDateFilter(d); setResVisFilterOpen(false); }}
                        style={{padding:'9px 14px',fontSize:13,color: resVisDateFilter === d ? '#1a1a1a' : '#555',fontWeight: resVisDateFilter === d ? 600 : 400,cursor:'pointer',background: resVisDateFilter === d ? '#f5f5f5' : '#fff'}}>
                        {d}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Active filter chips */}
            {(resVisFilter !== 'All' || resVisDateFilter !== 'All') && (
              <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                {resVisFilter !== 'All' && (
                  <span style={{background:'#f0f0f0',borderRadius:20,padding:'4px 12px',fontSize:12,color:'#1a1a1a',display:'flex',alignItems:'center',gap:6}}>
                    {resVisFilter}
                    <span onClick={() => setResVisFilter('All')} style={{cursor:'pointer',color:'#888',fontWeight:700,fontSize:14}}>×</span>
                  </span>
                )}
                {resVisDateFilter !== 'All' && (
                  <span style={{background:'#f0f0f0',borderRadius:20,padding:'4px 12px',fontSize:12,color:'#1a1a1a',display:'flex',alignItems:'center',gap:6}}>
                    {resVisDateFilter}
                    <span onClick={() => setResVisDateFilter('All')} style={{cursor:'pointer',color:'#888',fontWeight:700,fontSize:14}}>×</span>
                  </span>
                )}
              </div>
            )}

            {/* Date-grouped visitor cards */}
            {sortedDateKeys.map((dateKey, idx) => (
              <React.Fragment key={dateKey}>
                {/* Separator before historical section */}
                {idx === firstPastIdx && firstPastIdx > 0 && (
                  <div style={{display:'flex',alignItems:'center',gap:10,margin:'16px 0 12px'}}>
                    <div style={{flex:1,height:1,background:'#e0e0e0'}}></div>
                    <span style={{fontSize:11,color:'#999',fontWeight:500,whiteSpace:'nowrap'}}>Past Visitors</span>
                    <div style={{flex:1,height:1,background:'#e0e0e0'}}></div>
                  </div>
                )}
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,color: dateKey >= todayStr ? '#1a1a1a' : '#888',marginBottom:10}}>{formatDateLabel(dateKey)}</div>
                  {grouped[dateKey].map(v => (
                    <div key={'vc-'+v.id} onClick={() => { setSelectedVisitor(v); setCurrentPage('viewVisitor'); }}
                      style={{background: dateKey >= todayStr ? '#f5f5f5' : '#fafafa',borderRadius:10,padding:14,marginBottom:8,cursor:'pointer',opacity: dateKey < todayStr ? 0.8 : 1}}>
                      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                        <div style={{width:40,height:40,borderRadius:'50%',background:'#e8e8e8',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                            <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>{v.name}</div>
                            {vStatusBadge(v.status)}
                          </div>
                          <div style={{fontSize:12,color:'#666',marginBottom:3}}>{v.type || 'Guest'} — Personal visit</div>
                          <div style={{fontSize:11,color:'#999',marginBottom:3}}>{v.date} at {v.time}</div>
                          <div style={{fontSize:11,color:'#999'}}>
                            {v.status === 'Scheduled' ? 'Pre-Approved by: ' + (v.resident || 'Resident') :
                             v.status === 'Inside' ? 'Approved by: Security Guard' :
                             v.status === 'Rejected' ? 'Rejected by: Security Guard' :
                             v.status === 'Checked Out' ? 'Checked out' :
                             'Pre-Approved by: ' + (v.resident || 'Resident')}
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            ))}

            {filteredVisitors.length === 0 && (
              <div style={{textAlign:'center',color:'#999',padding:40,fontSize:13}}>No visitors found.</div>
            )}
          </div>
        );

      case 'home':
        const pendingVisitors_home = data.visitors.filter(v => v.status === 'Pending' || v.status === 'Waiting');
        const waitingApprovals = data.pendingApprovals || [];
        const scheduledVisitors = data.visitors.filter(v => v.status === 'Scheduled');
        // Services are booked separately — not from pre-approved visitors
        const upcomingServices = [];
        const recentAnnouncements = data.announcements ? data.announcements.filter(a => a.status === 'Live' || a.status === 'Sent').slice(0,2) : [];
        const bookingServices = [
          { label: 'Plumbing', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M4 22V12M4 12H8M4 12V8H2V6h4V4h2v2h4V4h2v2h2v2h-2v4h4v2h-4v8h-2v-8H8v8H6"/></svg>) },
          { label: 'Electrician', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>) },
          { label: 'Housekeeping', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>) },
          { label: 'Personal Trainer', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><circle cx="12" cy="5" r="3"/><path d="M6.5 8h11L19 10l-3 1v4l2 6h-2l-2-5h-4l-2 5H6l2-6v-4L5 10l1.5-2z"/></svg>) },
          { label: 'Swimming Pool', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M2 20c2-2 4-2 6 0s4 2 6 0 4-2 6 0M2 16c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><path d="M8 14V8a2 2 0 114 0v1"/></svg>) },
          { label: 'Table Tennis', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><circle cx="10" cy="10" r="7"/><path d="M15 15l6 6M14 10a4 4 0 01-4 4"/></svg>) },
          { label: 'Squash', icon: (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><circle cx="12" cy="10" r="6"/><path d="M10 16l-2 6M14 16l2 6"/></svg>) }
        ];
        return (
          <div className="res-content" style={{padding:'12px 16px',paddingBottom:20}}>
            {/* New Visitor — pending approvals */}
            <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,border:'1px solid #e8e8e8'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <span style={{fontSize:13,fontWeight:600,color:'#1a1a1a'}}>New Visitor</span>
                {waitingApprovals.length > 0 && <span style={{fontSize:11,color:'#888'}}>{waitingApprovals.length} pending</span>}
              </div>
              {waitingApprovals.length > 0 ? waitingApprovals.slice(0,2).map(v => (
                <div key={v.id} style={{marginBottom: 14}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                    <div style={{width:44,height:44,borderRadius:'50%',background: v.source === 'security' ? '#e3f2fd' : '#fff3e0',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {v.source === 'security' ? (
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1565c0" strokeWidth="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                      ) : (
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e65100" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
                      )}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>{v.name}</div>
                      <div style={{fontSize:11,color:'#8a8a8a'}}>{v.type} — {v.purpose || 'Personal visit'}</div>
                      <div style={{fontSize:11,color:'#8a8a8a'}}>
                        {v.source === 'security' ? 'From: Security Gate' : 'Waiting: ' + (v.timeWaiting || '—') + ' min'} — {v.flat || 'Gate: Main'}
                      </div>
                      {v.source === 'security' && v.repeater && (
                        <div style={{fontSize:10,color:'#1565c0',marginTop:2}}>{v.repeater}{v.vehicle ? ' — Vehicle: ' + v.vehicle : ''}</div>
                      )}
                    </div>
                    <span style={{fontSize:10,color: v.source === 'security' ? '#1565c0' : '#e65100',background: v.source === 'security' ? '#e3f2fd' : '#fff3e0',padding:'3px 10px',borderRadius:4,fontWeight:600}}>
                      {v.source === 'security' ? 'Security Request' : 'Waiting'}
                    </span>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={() => handleApproveVisitor(v)} style={{flex:1,padding:'10px 0',borderRadius:6,border:'none',background:'#2c3e50',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 6L9 17l-5-5"/></svg> Approve
                    </button>
                    <button onClick={() => handleRejectVisitor(v)} style={{flex:1,padding:'10px 0',borderRadius:6,border:'1px solid #d0d0d0',background:'#fff',color:'#c62828',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c62828" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg> Reject
                    </button>
                    <button onClick={() => setShowCallSecurity(!showCallSecurity)} style={{padding:'10px 14px',borderRadius:6,border:'1px solid #d0d0d0',background:'#fff',color:'#555',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                      Call
                    </button>
                  </div>
                  {showCallSecurity && (
                    <div style={{marginTop:8,background:'#f5f5f5',borderRadius:6,padding:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:'#1a1a1a'}}>Security Gate</div>
                        <div style={{fontSize:13,color:'#555'}}>+971 4 123 4567</div>
                      </div>
                      <a href="tel:+97141234567" style={{background:'#2c3e50',color:'#fff',borderRadius:6,padding:'8px 16px',fontSize:12,fontWeight:600,textDecoration:'none',display:'flex',alignItems:'center',gap:4}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                        Call Now
                      </a>
                    </div>
                  )}
                </div>
              )) : (
                <div style={{textAlign:'center',color:'#bbb',fontSize:12,padding:8}}>No pending visitor requests at the moment</div>
              )}
            </div>

            {/* Upcoming Visitor — all pre-approved guests */}
            <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,border:'1px solid #e8e8e8'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <span style={{fontSize:13,fontWeight:600,color:'#1a1a1a'}}>Upcoming Visitor</span>
                <span onClick={() => setCurrentPage('viewall')} style={{fontSize:11,color:'#888',cursor:'pointer'}}>See All ›</span>
              </div>
              {scheduledVisitors.length > 0 ? scheduledVisitors.slice(0,3).map(v => (
                <div key={'up-'+v.id} style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom: 10,paddingBottom:10,borderBottom:'1px solid #f5f5f5'}} onClick={() => { setSelectedVisitor(v); setCurrentPage('viewVisitor'); }}>
                  <div style={{width:40,height:40,borderRadius:'50%',background:'#f0f0f0',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>{v.name}</div>

                <div style={{textAlign:'center',color:'#bbb',fontSize:12,padding:8}}>No upcoming visitors</div>

              <button onClick={() => setCurrentPage('preapprove')} style={{width:'100%',marginTop:4,padding:'12px 0',borderRadius:8,border:'none',background:'#2c3e50',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',letterSpacing:'0.02em'}}>+ Pre-Approved Guest</button>

            {/* Upcoming Service — booked separately */}

              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                <div onClick={() => setHelpModal('security')} style={{cursor:'pointer',border:'1px solid #e8e8e8',borderRadius:8,padding:14,textAlign:'center',background:'#fafafa'}}>
                  <div style={{marginBottom:6}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>
                  <div style={{fontSize:10,color:'#555',fontWeight:500,lineHeight:'1.3'}}>Contact<br/>Security Head</div>
                </div>
                <div onClick={() => setHelpModal('pm')} style={{cursor:'pointer',border:'1px solid #e8e8e8',borderRadius:8,padding:14,textAlign:'center',background:'#fafafa'}}>
                  <div style={{marginBottom:6}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg></div>
                  <div style={{fontSize:10,color:'#555',fontWeight:500,lineHeight:'1.3'}}>Contact<br/>Property Mgr</div>
                </div>
                <div onClick={() => setHelpModal('incident')} style={{cursor:'pointer',border:'1px solid #e8e8e8',borderRadius:8,padding:14,textAlign:'center',background:'#fafafa'}}>
                  <div style={{marginBottom:6}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                  <div style={{fontSize:10,color:'#555',fontWeight:500,lineHeight:'1.3'}}>Report<br/>Incident</div>
                </div>
              </div>
            </div>
          </div>
        );
      case 'activity':
        return (
          <div className="res-content">
            <h3 className="res-section-title">Activity/Visitor Log — 05 April</h3>
            {data.entryLog.slice(0,4).map(e => (
              <div key={e.id} className="res-visitor-card">
                <div className="name">{e.visitor}</div>
                <div className="type">{e.type}</div>
                <div className="time">{e.timeIn} • {e.duration}</div>
                <div style={{marginTop:8,fontSize:11,color:'#28a745',fontWeight:600}}>✓ In</div>
              </div>
            ))}
          </div>
        );
      case 'more':
        return (
          <div className="res-content">
            <h3 className="res-section-title">Menu</h3>
            {[
              {label:'👨‍👩‍👧 My Household & Regular Visitors',page:'household'},
              {label:'👥 All Residents'},
              {label:'🔔 Notifications/Announcements'},
              {label:'💰 Payment History'},
              {label:'🔧 Service Requests'},
              {label:'⚙️ Profile Settings'},
              {label:'🚪 Logout',onClick:onLogout}
            ].map((item,i) => (
              <div
                key={i}
                onClick={() => {
                  if(item.onClick) item.onClick();
                  else if(item.page) setCurrentPage(item.page);
                }}
                style={{background:'#fff',border:'1px solid #e5e5e5',borderRadius:10,padding:14,marginBottom:10,cursor:'pointer'}}
              >
                <div style={{fontSize:13,fontWeight:500,color:'#1a1a1a'}}>{item.label}</div>
              </div>
            ))}
          </div>
        );
      case 'household':
        const [hhTab, setHhTab] = [resHhTab, setResHhTab];
        const [hhShowCreate, setHhShowCreate] = [resHhShowCreate, setResHhShowCreate];
        const [hhForm, setHhForm] = [resHhForm, setResHhForm];

        const hhFormDefaults = { name: '', phone: '', relation: 'Sister', role: 'Maid', schedule: 'Mon to Fri', hours: '9:00 AM to 17:00 PM', allowAccess: false, idDocType: 'Emirates ID', docNumber: '', vehicleNumber: '' };

        const saveHhMember = () => {
          if (!hhForm.name.trim()) { showToast('Please enter a name'); return; }
          if (!hhForm.phone.trim()) { showToast('Please enter a mobile number'); return; }
          if (resHhEditingId) {
            // Edit existing
            if (hhTab === 'family') {
              setData(prev => ({ ...prev, household: prev.household.map(m => m.id === resHhEditingId ? { ...m, name: hhForm.name.trim(), phone: hhForm.phone.trim(), relation: hhForm.relation, allowAccess: hhForm.allowAccess, idDocType: hhForm.idDocType, docNumber: hhForm.docNumber, vehicleNumber: hhForm.vehicleNumber } : m) }));
            } else {
              setData(prev => ({ ...prev, regularVisitors: prev.regularVisitors.map(v => v.id === resHhEditingId ? { ...v, name: hhForm.name.trim(), phone: hhForm.phone.trim(), role: hhForm.role, schedule: hhForm.schedule, hours: hhForm.hours, idDocType: hhForm.idDocType, docNumber: hhForm.docNumber, vehicleNumber: hhForm.vehicleNumber } : v) }));
            }
            setResHhEditingId(null);
            showToast('Updated successfully');
          } else {
            // Create new
            const base = { id: Date.now(), name: hhForm.name.trim(), phone: hhForm.phone.trim(), status: 'Active', idDocType: hhForm.idDocType, docNumber: hhForm.docNumber, vehicleNumber: hhForm.vehicleNumber };
            if (hhTab === 'family') {
              setData(prev => ({ ...prev, household: [...prev.household, { ...base, relation: hhForm.relation, allowAccess: hhForm.allowAccess }] }));
            } else {
              setData(prev => ({ ...prev, regularVisitors: [...prev.regularVisitors, { ...base, role: hhForm.role, schedule: hhForm.schedule, hours: hhForm.hours }] }));
            }
            showToast((hhTab === 'family' ? 'Family member' : 'Regular visitor') + ' added');
          }
          setHhShowCreate(false);
          setHhForm(hhFormDefaults);
        };

        const deleteHhMember = (id) => {
          if (hhTab === 'family') {
            setData(prev => ({ ...prev, household: prev.household.filter(m => m.id !== id) }));
          } else {
            setData(prev => ({ ...prev, regularVisitors: prev.regularVisitors.filter(v => v.id !== id) }));
          }
          showToast('Removed');
        };

        const startEditHh = (member) => {
          setResHhEditingId(member.id);
          if (hhTab === 'family') {
            setHhForm({ name: member.name, phone: member.phone, relation: member.relation || 'Sister', allowAccess: member.allowAccess || false, idDocType: member.idDocType || 'Emirates ID', docNumber: member.docNumber || '', vehicleNumber: member.vehicleNumber || '', role: 'Maid', schedule: 'Mon to Fri', hours: '9:00 AM to 17:00 PM' });
          } else {
            setHhForm({ name: member.name, phone: member.phone, role: member.role || 'Maid', schedule: member.schedule || 'Mon to Fri', hours: member.hours || '9:00 AM to 17:00 PM', idDocType: member.idDocType || 'Emirates ID', docNumber: member.docNumber || '', vehicleNumber: member.vehicleNumber || '', relation: 'Sister', allowAccess: false });
          }
          setHhShowCreate(true);
        };

        // Generate QR data for a household member
        const hhQrData = (member, type) => {
          return JSON.stringify({
            permit: 'HH-' + member.id,
            property: 'Sky Tower - The Pinnacle Residences',
            unit: 'B-102',
            resident: 'Nitin Sharma',
            name: member.name,
            mobile: member.phone,
            type: type === 'family' ? 'Family — ' + (member.relation || 'Member') : 'Regular — ' + (member.role || 'Visitor'),
            idDoc: (member.idDocType || 'Emirates ID') + (member.docNumber ? ': ' + member.docNumber : ''),
            vehicle: member.vehicleNumber || 'N/A',
            access: type === 'family' ? 'Permanent Resident' : (member.schedule || 'Scheduled') + ' / ' + (member.hours || ''),
            status: member.status || 'Active',
            validUntil: 'Until cancelled'
          });
        };

        // ---- MEMBER DETAIL + QR VIEW ----
        if (resHhViewMember) {
          const vm = resHhViewMember;
          const vmType = hhTab;
          const vmQrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(hhQrData(vm, vmType));
          const vmInfoRows = vmType === 'family' ? [
            ['Name', vm.name], ['Phone', vm.phone], ['Relation', vm.relation || 'Family'],
            ['ID Document', (vm.idDocType || 'Emirates ID') + (vm.docNumber ? ': ' + vm.docNumber : '')],
            ['Vehicle', vm.vehicleNumber || 'N/A'], ['Access', vm.allowAccess ? 'Full Access' : 'Standard'],
            ['Status', vm.status || 'Active'], ['Valid Until', 'Until cancelled']
          ] : [
            ['Name', vm.name], ['Phone', vm.phone], ['Role', vm.role],
            ['Schedule', vm.schedule], ['Hours', vm.hours],
            ['ID Document', (vm.idDocType || 'Emirates ID') + (vm.docNumber ? ': ' + vm.docNumber : '')],
            ['Vehicle', vm.vehicleNumber || 'N/A'],
            ['Status', vm.status || 'Active'], ['Valid Until', 'Until cancelled']
          ];

          return (
            <div className="res-content" style={{padding:'12px 16px',paddingBottom:80}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
                <button onClick={() => setResHhViewMember(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#4d4d4f'}}>‹</button>
                <span style={{fontSize:16,fontWeight:600,color:'#1a1a1a'}}>{vm.name}</span>
              </div>

              {/* Status badge */}
              <div style={{textAlign:'center',marginBottom:16}}>
                <span style={{background:'#e8f5e9',color:'#2e7d32',padding:'6px 20px',borderRadius:20,fontSize:12,fontWeight:600,letterSpacing:'0.04em'}}>
                  {vmType === 'family' ? 'FAMILY MEMBER' : 'REGULAR VISITOR'} — ACTIVE
                </span>
              </div>

              {/* QR Code */}
              <div style={{textAlign:'center',marginBottom:20}}>
                <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:12,padding:20,display:'inline-block'}}>
                  <img src={vmQrUrl} alt="QR Code" style={{width:180,height:180}} />
                </div>
                <div style={{fontSize:11,color:'#999',marginTop:8}}>Security will scan this QR to verify entry</div>
              </div>

              {/* Info rows */}
              <div style={{background:'#f5f5f5',borderRadius:10,overflow:'hidden',marginBottom:16}}>
                {vmInfoRows.map(([label, val], i) => (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom: i < vmInfoRows.length-1 ? '1px solid #e8e8e8' : 'none'}}>
                    <span style={{fontSize:12,color:'#888'}}>{label}</span>
                    <span style={{fontSize:12,color: label === 'Status' ? '#2e7d32' : '#1a1a1a',fontWeight:500,textAlign:'right',maxWidth:'60%'}}>{val}</span>
                  </div>
                ))}
              </div>

              {/* Actions */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <button onClick={() => { setResHhViewMember(null); startEditHh(vm); }}
                  style={{padding:14,background:'#fff',color:'#1a1a1a',border:'1px solid #d0d0d0',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  Edit Details
                </button>
                <button onClick={() => {
                  const link = document.createElement('a'); link.href = vmQrUrl; link.download = vm.name.replace(/\s+/g,'_') + '_QR.png'; link.click();
                  showToast('QR code downloaded');
                }} style={{padding:14,background:'#1a1a1a',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  Share QR Pass
                </button>
              </div>
              <button onClick={() => { deleteHhMember(vm.id); setResHhViewMember(null); }}
                style={{width:'100%',padding:14,background:'#fff',color:'#c62828',border:'1px solid #c62828',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                Remove {hhTab === 'family' ? 'Family Member' : 'Regular Visitor'}
              </button>
            </div>
          );
        }

        // ---- CREATE / EDIT FORM ----
        if (hhShowCreate) {
          return (
            <div className="res-content" style={{padding:'12px 16px',paddingBottom:80}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
                <button onClick={() => { setHhShowCreate(false); setResHhEditingId(null); setHhForm(hhFormDefaults); }} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#4d4d4f'}}>‹</button>
                <span style={{fontSize:16,fontWeight:500,color:'#1a1a1a'}}>{resHhEditingId ? 'Edit' : 'Add'} {hhTab === 'family' ? 'family member' : 'regular visitor'}</span>
              </div>

              {/* Identity section */}
              <div style={{background:'#f5f5f5',borderRadius:8,overflow:'hidden',marginBottom:16}}>
                <div style={{background:'#e8e8e8',padding:'10px 16px',fontSize:12,fontWeight:600,color:'#1a1a1a',letterSpacing:'0.02em'}}>
                  {hhTab === 'family' ? 'Resident Identity' : 'Visitor Identity'}
                </div>
                <div style={{padding:16}}>
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Full Name *</label>
                    <input value={hhForm.name} onChange={e => setHhForm(p => ({...p, name: e.target.value}))} placeholder="Enter full name..."
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,outline:'none',boxSizing:'border-box',background:'#fff'}} />
                  </div>
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Mobile Number *</label>
                    <input value={hhForm.phone} onChange={e => setHhForm(p => ({...p, phone: e.target.value}))} placeholder="+971 XXXXX XXXX" type="tel"
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,outline:'none',boxSizing:'border-box',background:'#fff'}} />
                  </div>
                </div>
              </div>

              {/* ID Document section */}
              <div style={{background:'#f5f5f5',borderRadius:8,overflow:'hidden',marginBottom:16}}>
                <div style={{background:'#e8e8e8',padding:'10px 16px',fontSize:12,fontWeight:600,color:'#1a1a1a',letterSpacing:'0.02em'}}>
                  Identification & Vehicle
                </div>
                <div style={{padding:16}}>
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>ID Document Type</label>
                    <select value={hhForm.idDocType} onChange={e => setHhForm(p => ({...p, idDocType: e.target.value}))}
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,background:'#fff',outline:'none',boxSizing:'border-box'}}>
                      {['Emirates ID','Passport','Driving License','National ID','Other'].map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Document Number</label>
                    <input value={hhForm.docNumber} onChange={e => setHhForm(p => ({...p, docNumber: e.target.value}))} placeholder="Enter document number..."
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,outline:'none',boxSizing:'border-box',background:'#fff'}} />
                  </div>
                  <div>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Vehicle Number</label>
                    <input value={hhForm.vehicleNumber} onChange={e => setHhForm(p => ({...p, vehicleNumber: e.target.value}))} placeholder="e.g. DXB 12345 (optional)"
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,outline:'none',boxSizing:'border-box',background:'#fff'}} />
                  </div>
                </div>
              </div>

              {/* Role/Relation section */}
              {hhTab === 'family' ? (
                <div style={{background:'#f5f5f5',borderRadius:8,padding:16,marginBottom:20}}>
                  <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Relation Type</label>
                  <select value={hhForm.relation} onChange={e => setHhForm(p => ({...p, relation: e.target.value}))}
                    style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,background:'#fff',outline:'none',boxSizing:'border-box'}}>
                    {['Sister','Brother','Mother','Father','Spouse','Son','Daughter','Other'].map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                  <div style={{marginTop:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Allow Access for Request</label>
                    <div onClick={() => setHhForm(p => ({...p, allowAccess: !p.allowAccess}))} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                      <div style={{width:20,height:20,border:'1px solid #ccc',borderRadius:3,background: hhForm.allowAccess ? '#1a1a1a' : '#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {hhForm.allowAccess && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>}
                      </div>
                      <span style={{fontSize:12,color:'#555'}}>Enable access requests</span>
                    </div>
                  </div>
                </div>
              ) : (
                <div style={{background:'#f5f5f5',borderRadius:8,padding:16,marginBottom:20}}>
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Role</label>
                    <select value={hhForm.role} onChange={e => setHhForm(p => ({...p, role: e.target.value}))}
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,background:'#fff',outline:'none',boxSizing:'border-box'}}>
                      {['Maid','Nanny','Driver','Cook','Gardener','Tutor','Other'].map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Schedule</label>
                    <select value={hhForm.schedule} onChange={e => setHhForm(p => ({...p, schedule: e.target.value}))}
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,background:'#fff',outline:'none',boxSizing:'border-box'}}>
                      {['Mon to Fri','Mon, Wed, Fri','Tue, Thu, Sat','Everyday','Weekends','Custom'].map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:'#888',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6,fontWeight:600}}>Hours</label>
                    <input value={hhForm.hours} onChange={e => setHhForm(p => ({...p, hours: e.target.value}))} placeholder="9:00 AM to 17:00 PM"
                      style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:4,fontSize:13,outline:'none',boxSizing:'border-box',background:'#fff'}} />
                  </div>
                </div>
              )}

              <button onClick={saveHhMember} style={{width:'100%',padding:16,background:'#1a1a1a',color:'#fff',border:'none',borderRadius:4,fontSize:14,fontWeight:600,cursor:'pointer'}}>
                {resHhEditingId ? 'Save Changes' : 'Save'}
              </button>
            </div>
          );
        }

        // ---- MAIN LIST VIEW ----
        return (
          <div className="res-content" style={{padding:'12px 16px',paddingBottom:80}}>
            <div style={{fontSize:20,fontWeight:600,color:'#1a1a1a',marginBottom:16}}>My Household</div>

            {/* Tabs */}
            <div style={{display:'flex',marginBottom:16,borderRadius:6,overflow:'hidden',border:'1px solid #1a1a1a'}}>
              <button onClick={() => setHhTab('family')} style={{flex:1,padding:'12px 0',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',background: hhTab==='family' ? '#1a1a1a' : '#fff',color: hhTab==='family' ? '#fff' : '#1a1a1a'}}>Family member</button>
              <button onClick={() => setHhTab('regular')} style={{flex:1,padding:'12px 0',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',background: hhTab==='regular' ? '#1a1a1a' : '#fff',color: hhTab==='regular' ? '#fff' : '#1a1a1a'}}>Regular Visitor</button>
            </div>

            {/* Create button */}
            <button onClick={() => { setHhForm(hhFormDefaults); setResHhEditingId(null); setHhShowCreate(true); }}
              style={{background:'#fff',border:'1px solid #1a1a1a',borderRadius:4,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',marginBottom:16,color:'#1a1a1a'}}>+ Create</button>

            {hhTab === 'family' ? (
              data.household.length === 0 ? (
                <div style={{textAlign:'center',color:'#bbb',padding:32,fontSize:13}}>No family members added yet.</div>
              ) : data.household.map(m => (
                <div key={m.id} onClick={() => setResHhViewMember(m)} style={{background:'#f5f5f5',borderRadius:10,padding:14,marginBottom:10,cursor:'pointer'}}>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <div style={{width:42,height:42,borderRadius:'50%',background:'#e8e8e8',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                        <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>{m.name}</div>
                        <span style={{background:'#e8f5e9',color:'#2e7d32',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600}}>{m.status}</span>
                      </div>
                      <div style={{fontSize:12,color:'#888',marginBottom:2}}>{m.relation || 'Family'} — {m.phone}</div>
                      <div style={{fontSize:11,color:'#bbb'}}>{m.idDocType || 'Emirates ID'}{m.docNumber ? ': ' + m.docNumber : ''}</div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                </div>
              ))
            ) : (
              data.regularVisitors.length === 0 ? (

const QrScannerModal = ({ onClose, onScanned }) => {
  const scannerRef = React.useRef(null);
  const html5QrCodeRef = React.useRef(null);
  const [error, setError] = React.useState('');
  const [manualInput, setManualInput] = React.useState('');
  const [showManual, setShowManual] = React.useState(false);

  React.useEffect(() => {
    let mounted = true;
    const startScanner = async () => {
      if (!scannerRef.current) return;
      // Check if Html5Qrcode library is loaded
      if (typeof Html5Qrcode === 'undefined') {
        if (mounted) { setError('QR scanner library not loaded. Use manual entry.'); setShowManual(true); }
        return;
      }
      try {
        const html5QrCode = new Html5Qrcode('sec-qr-reader');
        html5QrCodeRef.current = html5QrCode;
        await html5QrCode.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            if (!mounted) return;
            try { html5QrCode.stop().catch(() => {}); } catch(e) {}
            onScanned(decodedText);
          },
          () => {}
        );
      } catch (err) {
        console.log('QR scanner error:', err);
        if (mounted) {
          setError('Camera not available — use manual entry below.');
          setShowManual(true);
        }
      }
    };
    // Small delay to ensure DOM is ready
    const timer = setTimeout(startScanner, 300);
    return () => {
      mounted = false;
      clearTimeout(timer);
      if (html5QrCodeRef.current) {
        try { html5QrCodeRef.current.stop().catch(() => {}); } catch(e) {}
      }
    };
  }, []);

  const handleManualSubmit = () => {
    if (manualInput.trim()) onScanned(manualInput.trim());
  };

  return (
    <div className="sec-scanner-overlay">
      <div className="sec-scanner-header">
        <div className="sec-scanner-title">Scan Visitor QR Code</div>
        <button className="sec-scanner-close" onClick={onClose}>&times;</button>
      </div>

      {!showManual && (
        <React.Fragment>
          <div className="sec-scanner-camera">
            <div id="sec-qr-reader" ref={scannerRef} style={{width:'100%'}}></div>
          </div>
          <div className="sec-scanner-hint">Position the QR code within the frame to scan automatically</div>
        </React.Fragment>
      )}

      {error && <div style={{color:'#ffc107',fontSize:13,marginBottom:16,textAlign:'center'}}>{error}</div>}

      {showManual && (
        <div style={{width:'100%',maxWidth:500}}>
          <div style={{color:'#ccc',fontSize:13,marginBottom:4}}>Enter permit reference or visitor name:</div>
          <div style={{color:'#999',fontSize:11,marginBottom:12}}>e.g. VIS-2026-0009 or paste the full QR code data</div>
          <textarea
            className="sec-scanned-input"
            rows={3}
            placeholder="Enter permit ref (e.g. VIS-2026-0009) or visitor name..."
            value={manualInput}
            onChange={e => setManualInput(e.target.value)}
          />
          <button
            onClick={handleManualSubmit}
            style={{marginTop:12,width:'100%',padding:14,background:'linear-gradient(135deg,#ae9751,#c9b06b)',color:'#1a1a1a',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',letterSpacing:1}}
          >LOOK UP VISITOR</button>
        </div>
      )}

      {!showManual && (
        <button
          onClick={() => setShowManual(true)}
          style={{marginTop:12,background:'none',border:'1px solid #555',color:'#ccc',padding:'10px 24px',borderRadius:8,fontSize:12,cursor:'pointer'}}
        >Enter manually instead</button>
      )}
    </div>
  );

const ScannedVisitorForm = ({ scannedData, onClose, onSave }) => {
  const { data } = useApp();
  const [securityNotes, setSecurityNotes] = React.useState('');
  const [idVerified, setIdVerified] = React.useState(false);
  const [vehicleVerified, setVehicleVerified] = React.useState(false);
  const [additionalGuests, setAdditionalGuests] = React.useState('');
  const [gateUsed, setGateUsed] = React.useState('Main Gate');
  const [idDocType, setIdDocType] = React.useState('');
  const [idDocNumber, setIdDocNumber] = React.useState('');
  const [idError, setIdError] = React.useState('');

  const parsed = React.useMemo(() => {
    if (!scannedData) return {};
    try {
      // Step 1: Extract the permit ref from whatever was scanned
      let input = scannedData.trim();

      // If it's a URL with ?scan= param, extract the permit ref
      if (input.startsWith('http')) {
        try {
          const url = new URL(input);
          const scanParam = url.searchParams.get('scan');
          if (scanParam) input = scanParam;
        } catch(e) {}
      }

      // If it's JSON, try to extract permit from it
      try {
        const j = JSON.parse(input);
        if (j.v === 1 && j.p) input = j.p;
        else if (j._varspm && j.permit) input = j.permit;
      } catch(e) {}

      // Step 2: Look up the permit ref in visitors data
      const match = data.visitors.find(v =>
        v.permitRef === input ||
        v.name === input ||
        v.name.toLowerCase() === input.toLowerCase() ||
        (v.permitRef && input.includes(v.permitRef))
      );
      if (match) {
        // If visitor has qrPayload, use it for full details
        const qp = match.qrPayload || {};
        return {
          permit: match.permitRef || '',
          property: qp.property || 'Sky Tower',
          unit: match.flat || qp.unit || '',
          host: match.resident || qp.resident || '',
          visitor: match.name || '',
          phone: match.contact || qp.mobile || '',
          type: match.type || qp.type || '',
          guests: qp.guests || '0',
          vehicle: qp.vehicle || '',
          id: qp.idDoc || '',
          date: match.date || qp.date || '',
          time: match.time || qp.time || '',
          'valid until': qp.validUntil || '',
          status: match.status === 'Scheduled' ? 'PRE-APPROVED' : (match.status || 'PRE-APPROVED')
        };
      }

      // Step 3: Try matching in entryLog
      const logMatch = data.entryLog.find(e =>
        e.refId === input ||
        e.visitor === input ||
        e.visitor.toLowerCase() === input.toLowerCase()
      );
      if (logMatch) {
        return {
          permit: logMatch.refId || '',
          property: 'Sky Tower',
          unit: logMatch.flat || '',
          host: logMatch.host || '',
          visitor: logMatch.visitor || '',
          phone: logMatch.phone || '',
          type: logMatch.type || '',
          guests: '0',
          vehicle: '',
          id: logMatch.idDoc || '',
          date: '',
          time: logMatch.timeIn || '',
          'valid until': '',
          status: logMatch.status
        };
      }

      // Step 4: Return minimal data with just the permit ref
      return { permit: input, visitor: '', status: 'UNKNOWN' };
    } catch(e) {
      console.log('Parse error:', e);
      return {};
    }
  }, [scannedData, data]);

  const isExpired = React.useMemo(() => {
    if (!parsed['valid until']) return false;
    try {
      const parts = parsed['valid until'].split('/');
      if (parts.length === 3) {
        const expiry = new Date(parts[2], parts[1]-1, parts[0], 23, 59, 59);
        return expiry < new Date();
      }
    } catch(e) {}
    return false;
  }, [parsed]);

  const hasData = parsed['visitor'] || parsed['permit'];
  const visitorName = parsed['visitor'] || 'Unknown Visitor';
  const initials = visitorName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  const status = isExpired ? 'expired' : (parsed['status'] === 'PRE-APPROVED' ? 'approved' : 'scheduled');
  const statusLabel = isExpired ? 'EXPIRED' : (parsed['status'] || 'PRE-APPROVED');

  const isGuest = (parsed['type'] || '').toLowerCase() === 'guest';

  const handleAction = (action) => {
    // For non-Guest visitors, require ID document before admitting
    if (!isGuest && action === 'admit') {
      if (!idDocType) { setIdError('Please select an ID document type'); return; }
      if (!idDocNumber.trim()) { setIdError('Please enter the document number'); return; }
    }
    const idDocFull = isGuest ? '' : (idDocType + (idDocNumber.trim() ? ': ' + idDocNumber.trim() : ''));
    onSave({
      visitor: visitorName,
      phone: parsed['phone'] || '',
      type: parsed['type'] || 'Guest',
      flat: parsed['unit'] || '',
      host: parsed['host'] || '',
      permit: parsed['permit'] || '',
      vehicle: parsed['vehicle'] || '',
      idDoc: idDocFull,
      date: parsed['date'] || '',
      time: parsed['time'] || '',
      guests: parsed['guests'] || '0',
      property: parsed['property'] || '',
      securityNotes,
      idVerified,
      vehicleVerified,
      gateUsed,
      action: action
    });
  };

  return (
    <div className="sec-scanner-overlay">
      <div className="sec-scanner-header">
        <div className="sec-scanner-title">Visitor Verification</div>
        <button className="sec-scanner-close" onClick={onClose}>&times;</button>
      </div>

      <div className="sec-scanned-form">
        {!hasData && (
          <div style={{textAlign:'center',padding:'40px 20px'}}>
            <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
            <div style={{fontFamily:'Cormorant Garamond, serif',fontSize:20,fontWeight:600,color:'#ffc107',marginBottom:8}}>No Matching Visitor Found</div>
            <div style={{color:'#999',fontSize:13,marginBottom:20}}>The scanned QR code or entered reference did not match any pre-approved visitor in the system.</div>
            <div style={{color:'#ccc',fontSize:12,marginBottom:20,background:'#1a1a1a',padding:12,borderRadius:8,textAlign:'left',wordBreak:'break-all'}}>
              <div style={{color:'#666',marginBottom:4}}>Scanned data:</div>
              {scannedData}
            </div>
            <button onClick={onClose} style={{padding:'12px 32px',background:'#333',border:'1px solid #555',color:'#fff',borderRadius:8,cursor:'pointer',fontSize:13}}>Go Back</button>
          </div>
        )}

        {hasData && (
        <div className="sec-scanned-header">
          <div className="sec-scanned-badge">{initials}</div>
          <div>
            <div className="sec-scanned-name">{visitorName}</div>
            <div className="sec-scanned-permit">{parsed['permit'] || 'No permit ref'}</div>
            <div className={`sec-scanned-status ${status}`}>{statusLabel}</div>
          </div>
        </div>
        )}

        {hasData && isExpired && (
          <div style={{background:'rgba(244,67,54,.1)',border:'1px solid rgba(244,67,54,.3)',borderRadius:8,padding:12,marginBottom:16,color:'#f44336',fontSize:13,textAlign:'center'}}>
            This pass has expired. Please contact the resident for a new approval.
          </div>
        )}

        {hasData && (
        <React.Fragment>
        <div className="sec-scanned-grid">
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Phone</div>
            <div className="sec-scanned-value">{parsed['phone'] || '—'}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Type</div>
            <div className="sec-scanned-value">{parsed['type'] || '—'}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Property / Unit</div>
            <div className="sec-scanned-value">{(parsed['property'] || '—') + ' / ' + (parsed['unit'] || '—')}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Host</div>
            <div className="sec-scanned-value">{parsed['host'] || '—'}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Date / Time</div>
            <div className="sec-scanned-value">{(parsed['date'] || '—') + ' at ' + (parsed['time'] || '—')}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Valid Until</div>
            <div className="sec-scanned-value" style={isExpired ? {color:'#f44336',borderColor:'#f44336'} : {}}>{parsed['valid until'] || '—'}</div>
          </div>
          {(parsed['type'] || '').toLowerCase() === 'guest' ? (
            <div className="sec-scanned-field">
              <div className="sec-scanned-label">ID Document</div>
              <div className="sec-scanned-value" style={{color:'#888',fontStyle:'italic'}}>Not required for guests</div>
            </div>
          ) : (
            <React.Fragment>
              <div className="sec-scanned-field">
                <div className="sec-scanned-label">ID Document Type <span style={{color:'#f44336'}}>*</span></div>
                <div style={{display:'flex',gap:6,marginTop:4}}>
                  {['Passport','Emirates ID','Driving License'].map(t => (
                    <button key={t} onClick={() => { setIdDocType(t); setIdError(''); }}
                      style={{flex:1,padding:'8px 4px',border: idDocType===t ? '2px solid #ae9751' : '1px solid #444',
                      borderRadius:6,background: idDocType===t ? 'rgba(174,151,81,.15)' : 'transparent',
                      color: idDocType===t ? '#ae9751' : '#999',fontSize:11,fontWeight: idDocType===t ? 600 : 400,cursor:'pointer'}}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
              <div className="sec-scanned-field">
                <div className="sec-scanned-label">Document Number <span style={{color:'#f44336'}}>*</span></div>
                <input value={idDocNumber} onChange={e => { setIdDocNumber(e.target.value); setIdError(''); }}
                  placeholder="Enter document number..."
                  className="sec-scanned-input"
                  style={{padding:'8px 12px',marginTop:4}} />
              </div>
              {idError && <div style={{gridColumn:'1/-1',color:'#f44336',fontSize:12,marginTop:-8,marginBottom:4}}>{idError}</div>}
            </React.Fragment>
          )}
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Vehicle</div>
            <div className="sec-scanned-value">{parsed['vehicle'] || 'None'}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Additional Guests</div>
            <div className="sec-scanned-value">{parsed['guests'] || '0'}</div>
          </div>
          <div className="sec-scanned-field">
            <div className="sec-scanned-label">Gate Used</div>
            <select
              className="sec-scanned-input"
              value={gateUsed}
              onChange={e => setGateUsed(e.target.value)}
              style={{padding:'8px 12px'}}
            >
              <option value="Main Gate">Main Gate</option>
              <option value="Service Gate">Service Gate</option>
              <option value="Parking Gate">Parking Gate</option>
            </select>
          </div>
        </div>

        <div style={{display:'flex',gap:16,marginBottom:16}}>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,color:'#ccc'}}>
            <input type="checkbox" checked={idVerified} onChange={e => setIdVerified(e.target.checked)} style={{accentColor:'#ae9751',width:18,height:18}} />
            ID Verified
          </label>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,color:'#ccc'}}>
            <input type="checkbox" checked={vehicleVerified} onChange={e => setVehicleVerified(e.target.checked)} style={{accentColor:'#ae9751',width:18,height:18}} />
            Vehicle Verified
          </label>
        </div>

        <div className="sec-scanned-field full" style={{marginBottom:16}}>
          <div className="sec-scanned-label">Security Notes (optional)</div>
          <textarea
            className="sec-scanned-input"
            rows={3}
            placeholder="Add any observations, notes, or additional details..."
            value={securityNotes}
            onChange={e => setSecurityNotes(e.target.value)}
          />
        </div>

        <div className="sec-scanned-actions">
          <button className="sec-btn-admit" onClick={() => handleAction('admit')} disabled={isExpired}>
            {isExpired ? 'PASS EXPIRED' : 'ADMIT VISITOR'}
          </button>
          <button className="sec-btn-hold" onClick={() => handleAction('hold')}>HOLD</button>
          <button className="sec-btn-reject" onClick={() => handleAction('reject')}>REJECT</button>
        </div>
        </React.Fragment>
        )}
      </div>
    </div>
  );
};

            <table className="sec-entry-log-table" style={{minWidth:1000}}>

                  <th style={{width:120}}>REF ID</th>
                  <th>VISITOR</th>
                  <th>TYPE</th>
                  <th style={{width:60}}>UNIT</th>
                  <th>HOST / RESIDENT</th>
                  <th>PURPOSE</th>
                  <th>TIME IN</th>
                  <th>TIME OUT</th>
                  <th>DURATION</th>
                  <th>ID DOC</th>
                  <th style={{width:110}}>STATUS</th>
                  <th style={{width:90}}>ACTION</th>

              </thead>
              <tbody>
                {pagedEntries.map((e,i) => {
                  const sts = getStatusStyle(e.status);
                  const rowNum = String(visRegPage * VIS_REG_PER_PAGE + i + 1).padStart(2,'0');
                  const isInside = sts.label === 'INSIDE';
                  const isPending = sts.label === 'PENDING';
                  return (
                    <tr key={e.id} style={{cursor:'pointer'}} onClick={() => { const match = findFullVisitor(e); if (match) setViewingVisitor(match); }}>

                          <div>
                            <div style={{fontWeight:600,color:'#1a1a1a',fontSize:12}}>{e.visitor}</div>
                            <div style={{fontSize:10,color:'#8a8a8a'}}>{e.phone || ''}</div>
                          </div>
                        </div>
                      </td>
                      <td>
                        <span style={{background:'#f0f0f0',border:'1px solid #d0d0d0',padding:'3px 8px',borderRadius:3,fontSize:10,color:'#8a8a8a',whiteSpace:'nowrap',display:'inline-block'}}>

                        </span>
                      </td>
                      <td>
                        <span style={{background:'#fff',border:'1px solid #d0d0d0',padding:'3px 8px',borderRadius:3,fontSize:11,fontWeight:600,color:'#1a1a1a',display:'inline-block'}}>
                          {e.flat || '—'}
                        </span>
                      </td>
                      <td style={{fontSize:12,color:'#8a8a8a'}}>{e.host || '—'}</td>
                      <td style={{fontSize:11,color:'#8a8a8a'}}>{e.purpose || '—'}</td>
                      <td style={{fontSize:12,color:'#1a1a1a',whiteSpace:'nowrap'}}>{e.timeIn || '—'}</td>
                      <td style={{fontSize:12,color:'#8a8a8a'}}>{e.timeOut || '—'}</td>
                      <td style={{fontSize:12,color:'#8a8a8a'}}>{e.duration || '—'}</td>
                      <td style={{fontSize:10,color:'#8a8a8a'}}>{e.idDoc || '—'}</td>
                      <td>
                        <span style={{background:sts.bg,color:sts.color,padding:'4px 10px',borderRadius:4,fontSize:10,fontWeight:700,display:'inline-block',letterSpacing:'0.03em',whiteSpace:'nowrap'}}>
                          {sts.label}
                        </span>
                        {isPending && e.status === 'AWAITING APPROVAL' && (
                          <div style={{fontSize:9,color:'#b8860b',marginTop:3}}>Calling resident</div>
                        )}
                      </td>
                      <td onClick={(ev) => ev.stopPropagation()}>
                        {isInside ? (
                          <button onClick={() => { const match = findFullVisitor(e); if (match) setViewingVisitor(match); }} style={{background:'#fff',border:'1px solid #d0d0d0',color:'#1a1a1a',padding:'4px 10px',borderRadius:3,fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> VIEW
                          </button>
                        ) : isPending ? (
                          <div style={{display:'flex',gap:4}}>
                            <button style={{background:'#1b5e20',border:'none',color:'#fff',width:24,height:24,borderRadius:4,fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <button style={{background:'#c62828',border:'none',color:'#fff',width:24,height:24,borderRadius:4,fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                          </div>
                        ) : sts.label === 'APPROVED' ? (
                          <button onClick={() => { const match = findFullVisitor(e); if (match) setViewingVisitor(match); }} style={{background:'#fff',border:'1px solid #d0d0d0',color:'#1a1a1a',padding:'4px 10px',borderRadius:3,fontSize:10,cursor:'pointer'}}>DETAILS</button>
                        ) : (
                          <button onClick={() => { const match = findFullVisitor(e); if (match) setViewingVisitor(match); }} style={{background:'#fff',border:'1px solid #d0d0d0',color:'#1a1a1a',padding:'4px 10px',borderRadius:3,fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> VIEW
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {filteredEntries.length === 0 && <div style={{textAlign:'center',color:'#8a8a8a',padding:32,fontSize:13}}>No entries match this filter.</div>}

          {/* Pagination footer */}

            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <button disabled={visRegPage === 0} onClick={() => setVisRegPage(p => p - 1)}

                ← PREV
              </button>
              {Array.from({length: Math.min(totalVisRegPages, 3)}, (_, i) => {
                const pg = totalVisRegPages <= 3 ? i : Math.max(0, Math.min(visRegPage - 1, totalVisRegPages - 3)) + i;
                return (
                  <button key={pg} onClick={() => setVisRegPage(pg)}
                    style={{background: pg === visRegPage ? '#1a1a1a' : '#fff', border:'1px solid ' + (pg === visRegPage ? '#1a1a1a' : '#d0d0d0'), color: pg === visRegPage ? '#fff' : '#1a1a1a', padding:'6px 10px', borderRadius:4, fontSize:10, cursor:'pointer', fontWeight: pg === visRegPage ? 700 : 400, minWidth:30}}>
                    {pg + 1}
                  </button>
                );
              })}
              <span style={{fontSize:10,color:'#8a8a8a'}}>PAGE {visRegPage + 1} / {totalVisRegPages}</span>
              <button disabled={visRegPage >= totalVisRegPages - 1} onClick={() => setVisRegPage(p => p + 1)}
                style={{background:'#fff',border:'1px solid #d0d0d0',color: visRegPage >= totalVisRegPages - 1 ? '#8a8a8a' : '#1a1a1a',padding:'6px 12px',borderRadius:4,fontSize:10,cursor: visRegPage >= totalVisRegPages - 1 ? 'default' : 'pointer',display:'flex',alignItems:'center',gap:4}}>
                NEXT →
              </button>
            </div>
          </div>

        </div>
      );
    }

    return null;
  };

  return (
    <div className="sec-app">
      {viewingVisitor && renderVisitorDetail()}
      <div className="sec-header">
        {/* Building + Gate */}
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:40,height:40,background:'#f5f5f5',border:'1px solid #e0e0e0',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="1.5"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:'#1a1a1a',lineHeight:1.2}}>Sky Tower</div>
            <div style={{fontSize:11,color:'#8a8a8a',marginTop:2}}>Al Reem Island — Shams Abu Dhabi — Abu Dhabi</div>
            <div style={{marginTop:8,position:'relative',display:'inline-block'}}>
              <select
                value={selectedGate}

                <option>Main Gate</option>
                <option>Side Gate A</option>
                <option>Side Gate B</option>
                <option>Emergency Exit</option>
                <option>Parking Gate</option>

              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>
        {/* Clock */}
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em',marginBottom:2}}>{clockDate}</div>
          <div style={{fontSize:36,fontWeight:300,color:'#1a1a1a',letterSpacing:'0.04em',lineHeight:1}}>{clockTime.replace(/:\d{2}\s/, ' ').split(' ')[0]}</div>
          <div style={{fontSize:14,color:'#8a8a8a',marginTop:2}}>{clockTime.includes('AM') ? 'AM' : 'PM'}</div>
        </div>
        {/* Guard on Duty */}
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em'}}>GUARD ON DUTY</div>
          <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>Suresh Kumar</div>
          <div style={{fontSize:10,color:'#8a8a8a'}}>ID: GRD-045</div>
          <div style={{fontSize:10,color:'#8a8a8a'}}>Shift: 06:00 — 14:00</div>
        </div>
        {/* Shift Status + Icons */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
          <div style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em'}}>SHIFT STATUS</div>
          <div style={{background:'#fff',border:'1px solid #1a1a1a',borderRadius:4,padding:'4px 12px',fontSize:11,fontWeight:600,color:'#1a1a1a'}}>ACTIVE</div>
          <div style={{fontSize:10,color:'#8a8a8a'}}>{shiftStr} elapsed</div>
          <div style={{display:'flex',gap:8,marginTop:4}}>
            <div style={{width:30,height:30,background:'#fff',border:'1px solid #e0e0e0',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8a8a8a" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
            </div>
            <div style={{width:30,height:30,background:'#fff',border:'1px solid #e0e0e0',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8a8a8a" strokeWidth="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
              <div style={{position:'absolute',top:-3,right:-3,width:14,height:14,background:'#c62828',borderRadius:'50%',fontSize:8,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>3</div>
            </div>
          </div>
        </div>
      </div>

        </div>
        <button className="sec-tab" style={{marginLeft:'auto',paddingRight:0}}>Access Policies</button>

      </div>

      {showScanner && (
        <QrScannerModal
          onClose={() => setShowScanner(false)}
          onScanned={handleQrScanned}
        />

      {scannedData && (
        <ScannedVisitorForm
          scannedData={scannedData}
          onClose={() => setScannedData(null)}
          onSave={handleVisitorSave}
        />

      {/* New Visitor Entry Form */}

                          <div key={t} onClick={() => setNewVisitorData({...newVisitorData, visitorType: t, idDocType: t === 'Resident Guest' ? '' : newVisitorData.idDocType})}
                            style={{padding:'10px 6px',border: newVisitorData.visitorType === t ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitorData.visitorType === t ? '#f0f0f0' : 'transparent',fontSize:11,color: newVisitorData.visitorType === t ? '#1a1a1a' : '#8a8a8a'}}>

                        {['Walk-in','Drive In'].map(t => (
                          <div key={t} onClick={() => setNewVisitorData({...newVisitorData, entryType: t})}
                            style={{padding:10,border: newVisitorData.entryType === t ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitorData.entryType === t ? '#f0f0f0' : 'transparent',fontSize:12,color: newVisitorData.entryType === t ? '#1a1a1a' : '#8a8a8a'}}>
                            {t}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Full Name */}
                    <div style={{marginBottom:16}}>

                      <input value={newVisitorData.fullName} onChange={e => setNewVisitorData({...newVisitorData, fullName: e.target.value})}
                        placeholder="Enter visitor's full name..."
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d0d0d0',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>

                    {/* Mobile Number */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Mobile Number *</label>
                      <input value={newVisitorData.mobile} onChange={e => setNewVisitorData({...newVisitorData, mobile: e.target.value})}

                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d0d0d0',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>

                    {/* ID Document Type — optional for Resident Guest, required for others */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:8}}>

                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>

                            style={{padding:10,border: newVisitorData.idDocType === t ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitorData.idDocType === t ? '#f0f0f0' : 'transparent',fontSize:12,color: newVisitorData.idDocType === t ? '#1a1a1a' : '#8a8a8a'}}>
                            {t}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Document Number */}
                    {newVisitorData.idDocType && (
                      <div style={{marginBottom:16}}>
                        <label style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Document Number {newVisitorData.visitorType !== 'Resident Guest' ? '*' : ''}</label>
                        <input value={newVisitorData.idDocNumber} onChange={e => setNewVisitorData({...newVisitorData, idDocNumber: e.target.value})}
                          placeholder="Enter document number..."
                          style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d0d0d0',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                      </div>
                    )}

                    {/* Purpose */}
                    <div style={{marginBottom:0}}>
                      <label style={{fontSize:10,color:'#8a8a8a',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Purpose of Visit</label>
                      <input value={newVisitorData.purpose} onChange={e => setNewVisitorData({...newVisitorData, purpose: e.target.value})}
                        placeholder="e.g. Personal visit, Delivery, Maintenance..."
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d0d0d0',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>
                  </div>

                  {/* Section 02 — Visit Details */}
                  <div style={{background:'#fff',border:'1px solid #e0e0e0',borderRadius:6,padding:20}}>
