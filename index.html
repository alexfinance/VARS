              </div>
            )}
          </div>
        </div>
      )}

      {/* Add Guard Modal */}
      {showAddGuard && (
        <div className="modal-overlay" onClick={() => { setShowAddGuard(false); setAddStep(1); setAddGuardForm({ fullName: '', company: '', contact: '', gate: '', shift: '', accessTimes: '', documents: [] }); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-sub">form/guard/add · Step {addStep} of 4</div><h2>Add Guard</h2></div>
              <button className="modal-close" onClick={() => { setShowAddGuard(false); setAddStep(1); setAddGuardForm({ fullName: '', company: '', contact: '', gate: '', shift: '', accessTimes: '', documents: [] }); }}>×</button>
            </div>
            <div className="wizard-steps">
              {['Compose', 'Audience', 'Schedule', 'Preview'].map((s, i) => (
                <React.Fragment key={s}>{i > 0 && <span className="wizard-sep">›</span>}<span className={`wizard-step ${addStep === i + 1 ? 'active' : ''}`}>{i + 1} {s}</span></React.Fragment>
              ))}
            </div>

            {/* Step 1: Basic Info */}
            {addStep === 1 && (
              <div>
                <p style={{ fontWeight: 600, marginBottom: 12 }}>Step 1: Basic Information</p>
                <div className="form-group"><label>Full Name</label><input className="form-input" placeholder="Guard full name" value={addGuardForm.fullName} onChange={e => setAddGuardForm({ ...addGuardForm, fullName: e.target.value })} /></div>
                <div className="form-group"><label>Company / Employer</label><input className="form-input" placeholder="Security company name" value={addGuardForm.company} onChange={e => setAddGuardForm({ ...addGuardForm, company: e.target.value })} /></div>
                <div className="form-group"><label>Contact Number</label><input className="form-input" placeholder="+971 5X XXX XXXX" value={addGuardForm.contact} onChange={e => setAddGuardForm({ ...addGuardForm, contact: e.target.value })} /></div>
                <div className="form-group"><label>Gate / Post Assignment</label><input className="form-input" placeholder="e.g. Main Gate" value={addGuardForm.gate} onChange={e => setAddGuardForm({ ...addGuardForm, gate: e.target.value })} /></div>
                <button className="btn btn-primary" style={{ width: '100%' }} onClick={() => setAddStep(2)}>Continue →</button>
              </div>
            )}

            {/* Step 2: Shift & Security Profile */}
            {addStep === 2 && (
              <div>
                <p style={{ fontWeight: 600, marginBottom: 12 }}>Step 2: Shift & Security Profile</p>
                <div className="form-group"><label>Shift Assignment</label>
                  {['Morning 06:00–14:00', 'Afternoon 14:00–22:00', 'Night 22:00–06:00'].map(s => {
                    const shiftName = s.split(' ')[0];
                    return (
                      <div key={s} className="personnel-item" style={{ marginBottom: 8, cursor: 'pointer', background: addGuardForm.shift === shiftName ? '#f0f0f0' : 'transparent', fontWeight: addGuardForm.shift === shiftName ? 600 : 400 }} onClick={() => setAddGuardForm({ ...addGuardForm, shift: shiftName })}>
                        {s}
                      </div>
                    );
                  })}
                </div>
                <div className="form-group"><label>Approved Access Times</label><input className="form-input" placeholder="e.g. Mon–Fri, 06:00–22:00" value={addGuardForm.accessTimes} onChange={e => setAddGuardForm({ ...addGuardForm, accessTimes: e.target.value })} /></div>
                <div className="grid-2"><button className="btn" onClick={() => setAddStep(1)}>← Back</button><button className="btn btn-primary" onClick={() => setAddStep(3)}>Continue →</button></div>
              </div>
            )}

            {/* Step 3: Documents & Verification */}
            {addStep === 3 && (
              <div>
                <p style={{ fontWeight: 600, marginBottom: 12 }}>Step 3: Documents & Verification</p>
                <input type="file" ref={fileInputRef} multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style={{ display: 'none' }}
                  onChange={(e) => { if (e.target.files.length > 0) handleFileSelect(e.target.files); e.target.value = ''; }} />
                <div ref={dropZoneRef}
                  onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); e.currentTarget.style.borderColor = '#1a1a1a'; e.currentTarget.style.background = '#f0f0f0'; }}
                  onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); e.currentTarget.style.borderColor = '#d0d0d0'; e.currentTarget.style.background = '#f9f9f9'; }}
                  onDrop={(e) => { e.preventDefault(); e.stopPropagation(); e.currentTarget.style.borderColor = '#d0d0d0'; e.currentTarget.style.background = '#f9f9f9'; if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files); }}
                  onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  style={{ marginBottom: 16, padding: 28, background: '#f9f9f9', border: '2px dashed #d0d0d0', borderRadius: 8, textAlign: 'center', cursor: 'pointer', transition: 'all 0.2s' }}>
                  <div style={{ marginBottom: 8 }}><Icon name="upload" size={24} /></div>
                  <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4 }}>Drag & drop files here</div>
                  <div style={{ fontSize: 11, color: '#888', marginBottom: 10 }}>National ID, Guard licence, Work permit</div>
                  <div style={{ fontSize: 11, color: '#888' }}>or <span style={{ color: '#1a1a1a', fontWeight: 600, textDecoration: 'underline' }}>Browse Files</span></div>
                  <div style={{ fontSize: 10, color: '#aaa', marginTop: 6 }}>PDF, DOC, JPG, PNG — up to 10 MB each</div>
                </div>
                {addGuardForm.documents.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    {addGuardForm.documents.map((doc, idx) => (
                      <div key={idx} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 12, padding: '10px 12px', background: '#f9f9f9', borderRadius: 6, marginBottom: 6, border: '1px solid #e8e8e8' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ background: '#e8e8e8', padding: '2px 6px', borderRadius: 3, fontSize: 10, fontWeight: 600, textTransform: 'uppercase' }}>{doc.type}</span>
                          <span style={{ fontWeight: 500 }}>{doc.name}</span>
                          <span style={{ color: '#888', fontSize: 10 }}>{doc.size}</span>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); handleRemoveDoc(idx); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#888', fontSize: 16, padding: '0 4px', lineHeight: 1 }}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                <div className="grid-2"><button className="btn" onClick={() => setAddStep(2)}>← Back</button><button className="btn btn-primary" onClick={() => setAddStep(4)}>Continue →</button></div>
              </div>
            )}

            {/* Step 4: Preview */}
            {addStep === 4 && (
              <div>
                <p style={{ fontWeight: 600, marginBottom: 12 }}>Step 4: Preview</p>
                <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
                  <div style={{ width: 48, height: 48, background: '#f0f0f0', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="user" size={20} /></div>
                  <div><div style={{ fontWeight: 600, fontSize: 16 }}>{addGuardForm.fullName || 'Guard Name'}</div><div style={{ fontSize: 12, color: '#888' }}>{addGuardForm.company || 'Company'}</div></div>
                </div>
                <div className="grid-2" style={{ marginBottom: 16 }}>
                  <div><div style={{ fontSize: 11, color: '#888' }}>Shift</div><div style={{ fontWeight: 600 }}>{addGuardForm.shift || 'Not selected'}</div></div>
                  <div><div style={{ fontSize: 11, color: '#888' }}>Gate / Post</div><div style={{ fontWeight: 600 }}>{addGuardForm.gate || 'Not specified'}</div></div>
                  <div><div style={{ fontSize: 11, color: '#888' }}>Contact</div><div style={{ fontWeight: 600 }}>{addGuardForm.contact || 'Not provided'}</div></div>
                  <div><div style={{ fontSize: 11, color: '#888' }}>Access Times</div><div style={{ fontWeight: 600 }}>{addGuardForm.accessTimes || 'Not specified'}</div></div>
                </div>
                <div className="grid-2"><button className="btn" onClick={() => setAddStep(3)}>← Back</button><button className="btn btn-primary" onClick={handleAddGuardCreate}>Create Profile</button></div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Deactivate Modal */}
      {showDeactivate && (
        <div className="modal-overlay" onClick={() => setShowDeactivate(null)}>
          <div className="modal" style={{ maxWidth: 440 }} onClick={e => e.stopPropagation()}>
            <h2 style={{ marginBottom: 8 }}>Deactivate Guard</h2>
            <p style={{ color: '#666', marginBottom: 20 }}>Are you sure you want to deactivate {showDeactivate.name}? They will be removed from the system.</p>
            <div className="grid-2"><button className="btn btn-danger" onClick={handleDeactivateGuard}>Confirm Deactivation</button><button className="btn" onClick={() => setShowDeactivate(null)}>Cancel</button></div>
          </div>
        </div>
      )}

      {/* Call Popup */}
      {showCallPopup && (
        <div className="modal-overlay" onClick={() => setShowCallPopup(null)}>
          <div className="modal" style={{ maxWidth: 320 }} onClick={e => e.stopPropagation()}>
            <h3 style={{ marginBottom: 8 }}>{showCallPopup.name}</h3>
            <div style={{ fontSize: 24, fontWeight: 600, marginBottom: 20, textAlign: 'center' }}>{showCallPopup.contact}</div>
            <button className="btn btn-primary" style={{ width: '100%', marginBottom: 8 }} onClick={() => { navigator.clipboard.writeText(showCallPopup.contact); showToast('Phone number copied!'); }}>Copy Number</button>
            <button className="btn" style={{ width: '100%' }} onClick={() => setShowCallPopup(null)}>Close</button>
          </div>
        </div>
      )}

      {/* Document Viewer Modal */}
      {showDocViewer && (
        <div className="modal-overlay" onClick={() => setShowDocViewer(null)}>
          <div className="modal" style={{ maxWidth: 600 }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div><h2 style={{ fontSize: 16 }}>Document Viewer</h2></div>
              <button className="modal-close" onClick={() => setShowDocViewer(null)}>×</button>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, padding: 12, background: '#f9f9f9', borderRadius: 6 }}>
              <span style={{ background: '#e8e8e8', padding: '4px 8px', borderRadius: 4, fontSize: 11, fontWeight: 700, textTransform: 'uppercase' }}>{showDocViewer.type}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{showDocViewer.name}</div>
                <div style={{ fontSize: 11, color: '#888' }}>{showDocViewer.size} · Uploaded {showDocViewer.uploadedAt} · Status: {showDocViewer.status}</div>
              </div>
            </div>
            <div style={{ background: '#f0f0f0', borderRadius: 8, marginBottom: 16, minHeight: 280, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
              {showDocViewer.dataUrl ? (
                ['jpg','jpeg','png','gif','webp'].includes(showDocViewer.type) ? (
                  <img src={showDocViewer.dataUrl} alt={showDocViewer.name} style={{ maxWidth: '100%', maxHeight: 400, objectFit: 'contain' }} />
                ) : showDocViewer.type === 'pdf' ? (
                  (() => {
                    // Convert base64 data URL to blob URL for iframe rendering
                    try {
                      const base64 = showDocViewer.dataUrl.split(',')[1];
                      const binary = atob(base64);
                      const bytes = new Uint8Array(binary.length);
                      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                      const blob = new Blob([bytes], { type: 'application/pdf' });
                      const blobUrl = URL.createObjectURL(blob);
                      return <iframe src={blobUrl} style={{ width: '100%', height: 400, border: 'none' }} title={showDocViewer.name} />;
                    } catch (e) {
                      return <div style={{ padding: 40, textAlign: 'center', color: '#888', fontSize: 12 }}><Icon name="eye" size={32} /><div style={{ marginTop: 8 }}>PDF preview failed</div><div style={{ fontSize: 11, marginTop: 4 }}>Use Download to open this file</div></div>;
                    }
                  })()
                ) : (
                  <div style={{ padding: 40, textAlign: 'center', color: '#888', fontSize: 12 }}><Icon name="eye" size={32} /><div style={{ marginTop: 8 }}>Preview not available for .{showDocViewer.type} files</div><div style={{ fontSize: 11, marginTop: 4 }}>Use Download to open this file</div></div>
                )
              ) : (
                <div style={{ padding: 40, textAlign: 'center', color: '#888', fontSize: 12 }}><Icon name="eye" size={32} /><div style={{ marginTop: 8 }}>No preview available</div><div style={{ fontSize: 11, marginTop: 4 }}>This is a sample document entry</div></div>
              )}
            </div>
            <button className="btn btn-primary" style={{ width: '100%', marginBottom: 8 }} onClick={() => {
              if (showDocViewer.dataUrl) {
                const a = document.createElement('a');
                a.href = showDocViewer.dataUrl;
                a.download = showDocViewer.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('Download started!');
              } else {
                showToast('No file data — sample document entry');
              }
            }}><Icon name="download" size={14} /> Download</button>
            <button className="btn" style={{ width: '100%' }} onClick={() => setShowDocViewer(null)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ==================== PROPERTIES PAGE ====================
const PropertiesPage = ({ searchSelectedItem, clearSearchSelection }) => {
  const { data, setData, showToast } = useApp();
  const [selectedResident, setSelectedResident] = useState(null);
  const [editingResident, setEditingResident] = useState(null);
  const [showImport, setShowImport] = useState(false); // false | 'pick' | 'csv' | 'excel' | 'sql'
  const [showExport, setShowExport] = useState(false); // false | 'pick'
  const [showAddResident, setShowAddResident] = useState(false);
  const [newRes, setNewRes] = useState({ name:'', flat:'', contact:'', coResidents:1, policy:'Standard', tower:'' });
  const [resSearch, setResSearch] = useState('');
  const [importFile, setImportFile] = useState(null);
  const importFileRef = useRef(null);

  // Open resident detail from search
  useEffect(() => {
    if (searchSelectedItem && searchSelectedItem.type === 'Resident' && searchSelectedItem.sourceData) {
      setSelectedResident(searchSelectedItem.sourceData);
      if (clearSearchSelection) clearSearchSelection();
    }
  }, [searchSelectedItem]);

  const handleAddResident = () => {
    if (!newRes.name || !newRes.flat) { showToast('Please fill in Name and Flat'); return; }
    const id = `RES-${String(data.residents.length+1).padStart(3,'0')}`;
    const entry = { id, name: newRes.name, flat: newRes.flat, contact: newRes.contact, coResidents: parseInt(newRes.coResidents)||1, status: 'Pending', policy: newRes.policy, absence: 'None' };
    setData(prev => ({...prev, residents: [...prev.residents, entry]}));
    setNewRes({ name:'', flat:'', contact:'', coResidents:1, policy:'Standard', tower:'' });
    setShowAddResident(false);
    showToast('Resident added successfully!');
  };

  const RESIDENT_COLUMNS = [
    {header:'ID', key:'id'}, {header:'Name', key:'name'}, {header:'Flat', key:'flat'},
    {header:'Co-Residents', key:'coResidents'}, {header:'Contact', key:'contact'},
    {header:'Status', key:'status'}, {header:'Policy', key:'policy'}, {header:'Scheduled Absence', key:'absence'}
  ];

  const handleExportResidents = (format) => {
    if (format === 'excel') {
      exportToExcel(filteredResidents, RESIDENT_COLUMNS, 'VARS_Residents_Export');
      showToast('Exported as Excel (.xlsx)');
    } else if (format === 'csv') {
      const header = RESIDENT_COLUMNS.map(c => c.header).join(',');
      const rows = filteredResidents.map(r => RESIDENT_COLUMNS.map(c => '"' + (r[c.key] !== undefined ? r[c.key] : '') + '"').join(','));
      const csv = [header, ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'VARS_Residents_Export.csv'; a.click();
      URL.revokeObjectURL(url);
      showToast('Exported as CSV');
    } else if (format === 'sql') {
      const lines = filteredResidents.map(r => {
        const vals = RESIDENT_COLUMNS.map(c => "'" + (r[c.key] !== undefined ? String(r[c.key]).replace(/'/g, "''") : '') + "'").join(', ');
        return `INSERT INTO residents (${RESIDENT_COLUMNS.map(c => c.key).join(', ')}) VALUES (${vals});`;
      });
      const sql = lines.join('\n');
      const blob = new Blob([sql], { type: 'text/sql' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'VARS_Residents_Export.sql'; a.click();
      URL.revokeObjectURL(url);
      showToast('Exported as SQL');
    }
    setShowExport(false);
  };

  const handleDownloadTemplate = (format) => {
    const sampleRow = { id: 'RES-001', name: 'John Smith', flat: 'A-101', coResidents: 2, contact: '+971 50 000 0000', status: 'Verified', policy: 'Standard', absence: 'None' };
    if (format === 'csv') {
      const header = RESIDENT_COLUMNS.map(c => c.header).join(',');
      const row = RESIDENT_COLUMNS.map(c => '"' + sampleRow[c.key] + '"').join(',');
      const csv = header + '\n' + row;
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'VARS_Residents_Template.csv'; a.click(); URL.revokeObjectURL(url);
    } else if (format === 'excel') {
      exportToExcel([sampleRow], RESIDENT_COLUMNS, 'VARS_Residents_Template');
    } else if (format === 'sql') {
      const cols = RESIDENT_COLUMNS.map(c => c.key).join(', ');
      const vals = RESIDENT_COLUMNS.map(c => "'" + sampleRow[c.key] + "'").join(', ');
      const sql = `-- Template: Residents table\nCREATE TABLE IF NOT EXISTS residents (\n${RESIDENT_COLUMNS.map(c => '  ' + c.key + ' TEXT').join(',\n')}\n);\n\n-- Sample row:\nINSERT INTO residents (${cols}) VALUES (${vals});`;
      const blob = new Blob([sql], { type: 'text/sql' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'VARS_Residents_Template.sql'; a.click(); URL.revokeObjectURL(url);
    }
    showToast('Template downloaded!');
  };

  const handleImportFile = (file, format) => {
    if (!file) { showToast('Please select a file first'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        let rows = [];
        if (format === 'csv') {
          const text = e.target.result;
          const lines = text.split('\n').filter(l => l.trim());
          if (lines.length < 2) { showToast('CSV file is empty or has no data rows'); return; }
          const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
          for (let i = 1; i < lines.length; i++) {
            const vals = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
            const obj = {};
            headers.forEach((h, idx) => { const col = RESIDENT_COLUMNS.find(c => c.header.toLowerCase() === h.toLowerCase() || c.key.toLowerCase() === h.toLowerCase()); if (col) obj[col.key] = vals[idx] || ''; });
            if (obj.name && obj.flat) rows.push(obj);
          }
        } else if (format === 'excel') {
          const wb = XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(ws);
          jsonData.forEach(row => {
            const obj = {};
            RESIDENT_COLUMNS.forEach(c => { const val = row[c.header] || row[c.key]; if (val !== undefined) obj[c.key] = val; });
            if (obj.name && obj.flat) rows.push(obj);
          });
        }
        if (rows.length === 0) { showToast('No valid rows found in file'); return; }
        const newResidents = rows.map((r, idx) => ({
          id: r.id || `RES-${String(data.residents.length + idx + 1).padStart(3, '0')}`,
          name: r.name, flat: r.flat, contact: r.contact || '', coResidents: parseInt(r.coResidents) || 1,
          status: r.status || 'Pending', policy: r.policy || 'Standard', absence: r.absence || 'None'
        }));
        setData(prev => ({ ...prev, residents: [...prev.residents, ...newResidents] }));
        showToast(`${newResidents.length} resident${newResidents.length !== 1 ? 's' : ''} imported!`);
        setShowImport(false); setImportFile(null);
      } catch (err) { showToast('Error reading file: ' + err.message); }
    };
    if (format === 'csv' || format === 'sql') reader.readAsText(file);
    else reader.readAsBinaryString(file);
  };

  const filteredResidents = data.residents.filter(r => {
    if (!resSearch) return true;
    return r.name.toLowerCase().includes(resSearch.toLowerCase()) || r.flat.toLowerCase().includes(resSearch.toLowerCase());
  });

  return (
    <div>
      <div className="page-header">
        <div><h1>Properties & Residents (PMC)</h1><div className="subtitle">{data.towers.length} properties · {data.towers.reduce((a,t)=>a+t.totalFlats,0).toLocaleString()} flats · {data.towers.reduce((a,t)=>a+t.occupied,0).toLocaleString()} occupied</div></div>
        <div className="btn-group">
          <button className="btn btn-primary" onClick={()=>setShowAddResident(true)}>+ Add Resident</button>
          <button className="btn" onClick={()=>setShowImport('pick')}><Icon name="upload" size={12}/> Import</button>
          <button className="btn" onClick={()=>setShowExport('pick')}><Icon name="download" size={12}/> Export</button>
        </div>
      </div>

      <div className="card"><h3 style={{marginBottom:16}}>Properties Overview</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))',gap:12}}>
          {data.towers.map(t => (
            <div key={t.name} style={{border:'1px solid #e5e5e5',borderRadius:10,padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{width:32,height:32,background:'#e8e3de',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='#a89a92' stroke-width='1.5'><rect x='4' y='2' width='16' height='20' rx='2'/><path d='M9 22V18h6v4M9 6h.01M15 6h.01M9 10h.01M15 10h.01M9 14h.01M15 14h.01'/></svg></div>
                <span style={{cursor:'pointer'}}>⋯</span>
              </div>
              <h3 style={{fontSize:14,marginBottom:2}}>{t.name}</h3>
              {t.location && <div style={{fontSize:11,color:'#a89a92',marginBottom:8}}>{t.location}</div>}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>Total Units</span><strong>{t.totalFlats.toLocaleString()}</strong></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>Occupied</span><strong>{t.occupied.toLocaleString()}</strong></div>
              <div className="progress-bar" style={{marginTop:8}}><div className="fill" style={{width:`${Math.round(t.occupied/t.totalFlats*100)}%`}}/></div>
              <div style={{fontSize:11,color:'#a89a92',marginTop:4}}>{Math.round(t.occupied/t.totalFlats*100)}% occupancy</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-header"><h3>Resident Registry</h3>
          <div style={{display:'flex',gap:8}}>
            <div className="search-bar" style={{maxWidth:200}}><span className="search-icon"><Icon name="search" size={14}/></span><input placeholder="Search resident or flat..." value={resSearch} onChange={e=>setResSearch(e.target.value)}/></div>
            <button className="btn btn-sm"><Icon name="filter" size={12}/> Filter</button>
          </div>
        </div>
        <table className="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Co-Resident</th><th>Flat</th><th>Contact</th><th>Status</th><th>Policy</th><th>Scheduled Absence</th><th>Actions</th></tr></thead>
          <tbody>
            {filteredResidents.map(r => (
              <tr key={r.id}>
                <td>{r.id}</td><td className="name-cell"><div style={{display:'flex',alignItems:'center',gap:6}}><Icon name="user" size={14}/>{r.name}</div></td>
                <td>{r.coResidents}</td><td>{r.flat}</td><td>{r.contact}</td>
                <td>{r.status==='Verified' ? <span className="status verified">✓ Verified</span> : <StatusBadge status="Pending"/>}</td>
                <td>{r.policy}</td><td>{r.absence}</td>
                <td><button className="btn btn-sm" onClick={()=>setSelectedResident(r)}>Property Details</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        <Pagination total={1087} pageSize={10} page={1} onPageChange={()=>{}}/>
      </div>

      {selectedResident && (
        <div className="modal-overlay" onClick={()=>setSelectedResident(null)}>
          <div className="modal modal-wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-sub">modal/resident/profile</div><h2>Resident Profile</h2></div>
              <button className="modal-close" onClick={()=>setSelectedResident(null)}>×</button>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
              <div style={{width:48,height:48,background:'#e8e3de',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="user" size={20}/></div>
              <div><div style={{fontWeight:600,fontSize:16}}>{selectedResident.name}</div><div style={{fontSize:12,color:'#a89a92'}}>{selectedResident.flat} · {selectedResident.id}</div></div>
            </div>
            <div className="grid-2" style={{marginBottom:16}}>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Contact</div><div style={{fontWeight:600}}>{selectedResident.contact}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Verification</div><div style={{fontWeight:600}}>{selectedResident.status}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Access Policy</div><div style={{fontWeight:600}}>{selectedResident.policy}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Scheduled Absence</div><div style={{fontWeight:600}}>{selectedResident.absence}</div></div>
            </div>
            <div style={{fontWeight:600,marginBottom:8}}>Preferences</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #ebe7e3'}}><span>Package auto-accept (whitelisted)</span><Toggle value={selectedResident.packageAutoAccept !== false} onChange={(v)=>{const updated={...selectedResident,packageAutoAccept:v};setSelectedResident(updated);setData(prev=>({...prev,residents:prev.residents.map(r=>r.id===selectedResident.id?{...r,packageAutoAccept:v}:r)}));showToast('Preference updated','Package auto-accept '+(v?'enabled':'disabled'))}}/></div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #ebe7e3'}}><span>Visitor pre-approval required</span><Toggle value={selectedResident.visitorPreApproval !== false} onChange={(v)=>{const updated={...selectedResident,visitorPreApproval:v};setSelectedResident(updated);setData(prev=>({...prev,residents:prev.residents.map(r=>r.id===selectedResident.id?{...r,visitorPreApproval:v}:r)}));showToast('Preference updated','Visitor pre-approval '+(v?'enabled':'disabled'))}}/></div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #ebe7e3'}}><span>Email notifications</span><Toggle value={selectedResident.emailNotifications === true} onChange={(v)=>{const updated={...selectedResident,emailNotifications:v};setSelectedResident(updated);setData(prev=>({...prev,residents:prev.residents.map(r=>r.id===selectedResident.id?{...r,emailNotifications:v}:r)}));showToast('Preference updated','Email notifications '+(v?'enabled':'disabled'))}}/></div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',marginBottom:16}}><span>Push notifications</span><Toggle value={selectedResident.pushNotifications !== false} onChange={(v)=>{const updated={...selectedResident,pushNotifications:v};setSelectedResident(updated);setData(prev=>({...prev,residents:prev.residents.map(r=>r.id===selectedResident.id?{...r,pushNotifications:v}:r)}));showToast('Preference updated','Push notifications '+(v?'enabled':'disabled'))}}/></div>
            <div className="grid-2" style={{marginTop:16}}>
              <button className="btn btn-primary" onClick={()=>setEditingResident({...selectedResident})}>Edit Profile</button>
              <button className="btn" onClick={()=>setSelectedResident(null)}>Close</button>
            </div>
          </div>
        </div>
      )}

      {editingResident && (
        <div className="modal-overlay" onClick={()=>setEditingResident(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-sub">form/resident/edit</div><h2>Edit Resident</h2></div>
              <button className="modal-close" onClick={()=>setEditingResident(null)}>×</button>
            </div>

// ==================== PRE-APPROVE FORM + QR CODE ====================
const PreApproveForm = ({ onBack, showToast, data, setData }) => {
  const [step, setStep] = useState('form'); // form | review | qr
  const [visitorType, setVisitorType] = useState('Resident Guest');
  const [entryType, setEntryType] = useState('Walk-in');
  const [fullName, setFullName] = useState('');
  const [mobile, setMobile] = useState('');
  const [additionalVisitors, setAdditionalVisitors] = useState(0);
  const [vehicleNumber, setVehicleNumber] = useState('');
  const [idDocType, setIdDocType] = useState('Passport');
  const [docNumber, setDocNumber] = useState('');
  const [remarks, setRemarks] = useState('');
  const [visitDate, setVisitDate] = useState('');
  const [visitTime, setVisitTime] = useState('');
  const [repeater, setRepeater] = useState('Single Visit');
  const [qrData, setQrData] = useState(null);
  const qrRef = useRef(null);
  const qrInstance = useRef(null);

  const generatePermitRef = () => {
    const d = new Date();
    const num = Math.floor(Math.random() * 9000) + 1000;
    return 'VPR-' + d.getFullYear() + '-' + num;
  };

  const handleSubmit = () => {
    if (!fullName.trim()) { showToast('Please enter visitor name'); return; }
    if (!mobile.trim()) { showToast('Please enter mobile number'); return; }

    const permitRef = generatePermitRef();
    const now = new Date();
    const baseDate = visitDate ? new Date(visitDate) : now;
    // Calculate validity based on repeater type
    let validUntil = '';
    let repeaterLabel = repeater;
    if (repeater === 'Single Visit') {
      validUntil = (visitDate || now.toLocaleDateString('en-GB')) + ' 23:59';
    } else {
      validUntil = 'Until cancelled';
    }
    const qrPayload = {
      permit: permitRef,
      property: 'Sky Tower - The Pinnacle Residences',
      unit: 'B-102',
      resident: 'Nitin Sharma',
      visitor: fullName.trim(),
      mobile: mobile.trim(),
      type: visitorType,
      entry: entryType,
      guests: additionalVisitors + 1,
      vehicle: vehicleNumber || 'N/A',
      idDoc: idDocType + (docNumber ? ': ' + docNumber : ''),
      date: visitDate || now.toLocaleDateString('en-GB'),
      time: visitTime || now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}),
      validUntil: validUntil,
      repeater: repeater,
      status: 'PRE-APPROVED',
      created: now.toISOString()
    };

    setQrData(qrPayload);
    setStep('review');
    // Visitor is NOT saved to the system yet — only saved when resident clicks "Pre-Approve" on the review page
  };

  // Called when resident confirms pre-approval on the review page
  const confirmPreApproval = () => {
    if (!qrData) return;
    const visitorEntry = {
      id: data.visitors.length + 1,
      name: qrData.visitor,
      resident: 'Nitin Sharma',
      flat: 'B-102',
      contact: qrData.mobile,
      type: qrData.type,
      gate: 'Main Gate',
      status: 'Scheduled',
      time: qrData.time,
      date: qrData.date,
      permitRef: qrData.permit,
      duration: '—',
      qrCode: 'Pre-approved',
      repeater: qrData.repeater || 'Single Visit',
      validUntil: qrData.validUntil,
      qrPayload: qrData
    };
    const logEntry = {
      id: data.entryLog.length + 1,
      refId: qrData.permit,
      visitor: qrData.visitor,
      phone: qrData.mobile,
      initials: qrData.visitor.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2),
      type: qrData.type,
      flat: 'B-102',
      host: 'Nitin Sharma',
      purpose: qrData.type + ' visit',
      timeIn: qrData.time,
      timeOut: '',
      duration: '—',
      idDoc: '',
      status: 'SCHEDULED'
    };
    const scheduleEntry = { time: qrData.time, description: qrData.visitor + ' — ' + qrData.type, flat: 'B-102', type: qrData.type };
    const pmScheduleEntry = { time: qrData.time, name: qrData.visitor + ' (' + qrData.type + ')', flat: 'B-102', type: qrData.type };
    setData(prev => ({
      ...prev,
      visitors: [visitorEntry, ...prev.visitors],
      entryLog: [logEntry, ...prev.entryLog],
      todayScheduleSecurity: [...prev.todayScheduleSecurity, scheduleEntry].sort((a, b) => a.time.localeCompare(b.time)),
      todaySchedule: [...prev.todaySchedule, pmScheduleEntry].sort((a, b) => a.time.localeCompare(b.time))
    }));
    showToast('Pre-approval confirmed and saved!');
    setStep('qr');
  };

  // QR contains just the permit ref — scanned only through Security app
  const getQrImgUrl = (permit) => 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(permit || 'UNKNOWN');

  useEffect(() => {
    if (step === 'qr' && qrData && qrRef.current) {
      qrRef.current.innerHTML = '<img src="' + getQrImgUrl(qrData.permit) + '" width="280" height="280" style="display:block;margin:0 auto;" crossorigin="anonymous" />';
    }
  }, [step, qrData]);

  const getShareText = () => {
    const d = qrData;
    if (!d) return '';
    return [
      'VARS — Visitor Pre-Approval*',
      '',
      '✅ Your visit has been pre-approved!',
      '',
      'Permit: ' + d.permit,
      'Property: ' + d.property,
      'Unit: ' + d.unit,
      'Host: ' + d.resident,
      'Date: ' + d.date,
      '⏰ Time: ' + d.time,
      'Vehicle: ' + d.vehicle,
      'Repeater: ' + (d.repeater || 'Single Visit'),
      '',
      'Show this message or QR code at the gate.',
      'Valid until: ' + d.validUntil
    ].join('\n');
  };

  const getQrBlob = () => {
    return new Promise((resolve) => {
      if (!qrRef.current) { resolve(null); return; }
      const img = qrRef.current.querySelector('img');
      if (!img) { resolve(null); return; }
      const drawPass = () => {
        const pad = 40, w = 400, qrSize = 180;
        const passCanvas = document.createElement('canvas');
        passCanvas.width = w; passCanvas.height = 620;
        const ctx = passCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, 620);
        ctx.fillStyle = '#ae9751'; ctx.fillRect(0, 0, w, 4);
        ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
        ctx.fillText('VARS — Visitor Pass', w/2, 36);
        ctx.fillStyle = '#2d6a4f'; ctx.font = 'bold 13px Arial';
        ctx.fillText('PRE-APPROVED', w/2, 58);
        ctx.drawImage(img, (w - qrSize) / 2, 72, qrSize, qrSize);
        ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 14px Arial';
        ctx.fillText(qrData ? qrData.permit : '', w/2, 272);
        ctx.textAlign = 'left'; ctx.font = '12px Arial';
        const details = qrData ? [
          ['Visitor', qrData.visitor], ['Phone', qrData.mobile], ['Property', qrData.property],
          ['Unit', qrData.unit], ['Host', qrData.resident], ['Type', qrData.type],
          ['Date', qrData.date], ['Time', qrData.time], ['Vehicle', qrData.vehicle],
          ['Repeater', qrData.repeater || 'Single Visit'], ['Valid Until', qrData.validUntil],
        ] : [];
        let y = 298;
        details.forEach(([label, val]) => {
          ctx.fillStyle = '#8a8a8a'; ctx.font = '11px Arial'; ctx.fillText(label, pad, y);
          ctx.fillStyle = '#1a1a1a'; ctx.font = '12px Arial'; ctx.fillText(val || '', 140, y); y += 24;
        });
        ctx.strokeStyle = '#e8e8e8'; ctx.beginPath(); ctx.moveTo(pad, y+4); ctx.lineTo(w-pad, y+4); ctx.stroke();
        ctx.fillStyle = '#8a8a8a'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
        ctx.fillText('Show this pass or scan QR code at the gate', w/2, y + 24);
        ctx.fillText('VARS Property Management System', w/2, y + 40);
        passCanvas.toBlob((blob) => { resolve(blob); }, 'image/png');
      };
      if (img.complete) { drawPass(); } else { img.onload = drawPass; img.onerror = () => resolve(null); }
    });
  };

  const getPassFile = async () => {
    const blob = await getQrBlob();
    if (!blob) return null;
    return new File([blob], 'VARS-PM-Pass-' + (qrData ? qrData.permit : 'QR') + '.png', { type: 'image/png' });
  };

  const sharePass = async () => {
    const file = await getPassFile();
    if (file && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file] });
        return;
      } catch (err) { if (err.name === 'AbortError') return; }
    }
    // Fallback: save image so user can attach it manually
    await savePassImage();
    showToast('Image saved — attach it in WhatsApp or Telegram');
  };

  const shareToWhatsApp = async () => {
    const file = await getPassFile();
    if (file && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file] });
        return;
      } catch (err) { if (err.name === 'AbortError') return; }
    }
    // Fallback: save + open WhatsApp so user can attach
    await savePassImage();
    window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent('Here is your visitor pass for ' + (qrData ? qrData.property : 'Sky Tower') + '. Please show the attached QR image at the gate.'), '_blank');
    showToast('Image saved — attach it in the WhatsApp chat');
  };

  const shareToTelegram = async () => {
    const file = await getPassFile();
    if (file && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file] });
        return;
      } catch (err) { if (err.name === 'AbortError') return; }
    }
    await savePassImage();
    window.open('https://t.me/share/url?url=' + encodeURIComponent('VARS Visitor Pass') + '&text=' + encodeURIComponent('Here is your visitor pass. Please show the attached QR image at the gate.'), '_blank');
    showToast('Image saved — attach it in the Telegram chat');
  };

  const savePassImage = async () => {
    const blob = await getQrBlob();
    if (!blob) { showToast('Could not generate image'); return; }
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'VARS-PM-Pass-' + (qrData ? qrData.permit : 'QR') + '.png';
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
  };

  // ---- STEP 2: REVIEW SCREEN (pass details, not yet saved) ----
  if (step === 'review') {
    return (
      <div className="res-content" style={{paddingBottom:80}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <button onClick={() => {setStep('form');}} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#6b5d52'}}>←</button>
          <h3 style={{fontSize:18,fontWeight:600,letterSpacing:'-0.01em',margin:0}}>Review Pre-Approval</h3>
        </div>

        <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20,marginBottom:16}}>
          <div style={{fontSize:11,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:12,fontWeight:600}}>Pass Details</div>
          {qrData && (() => {
            const rows = [
              ['Property', qrData.property],
              ['Unit / Flat', qrData.unit],
              ['Host', qrData.resident],
              ['Visitor', qrData.visitor],
              ['Phone', qrData.mobile],
              ['Type', qrData.type],
              ['Total Guests', String(qrData.guests)],
              ['Vehicle', qrData.vehicle],
              ['Date', qrData.date],
              ['Time', qrData.time],
              ['Repeater', qrData.repeater || 'Single Visit'],
              ['Valid Until', qrData.validUntil],
            ];
            return rows.map(([label, val], i) => (
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom: i < rows.length - 1 ? '1px solid #f0f0f0' : 'none'}}>
                <span style={{fontSize:12,color:'#a89a92'}}>{label}</span>
                <span style={{fontSize:12,color: label === 'Valid Until' && val === 'Until cancelled' ? '#2d6a4f' : '#1a1a1a',fontWeight:500,textAlign:'right',maxWidth:'60%'}}>{val}</span>
              </div>
            ));
          })()}
        </div>

        <button onClick={() => setStep('form')} style={{width:'100%',padding:14,background:'#fff',color:'#1a1a1a',border:'1px solid #d5cfc8',borderRadius:6,fontSize:14,fontWeight:500,cursor:'pointer',marginBottom:12,letterSpacing:'0.03em'}}>
          Edit Details
        </button>

        <button onClick={confirmPreApproval} style={{width:'100%',padding:16,background:'#5a6b4f',color:'#fff',border:'none',borderRadius:6,fontSize:15,fontWeight:700,cursor:'pointer',letterSpacing:'0.04em'}}>
          Pre-Approve Visitor
        </button>
      </div>
    );
  }

  // ---- STEP 3: QR CODE SCREEN (after confirmed, visitor saved) ----
  if (step === 'qr') {
    return (
      <div className="res-content" style={{paddingBottom:80}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <button onClick={onBack} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#6b5d52'}}>←</button>
          <h3 style={{fontSize:18,fontWeight:600,letterSpacing:'-0.01em',margin:0}}>Visitor Pre-Approved</h3>
        </div>

        <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:24,textAlign:'center',marginBottom:16}}>
          <div style={{background:'#e0e5db',color:'#5a6b4f',padding:'8px 16px',borderRadius:4,display:'inline-block',fontSize:13,fontWeight:600,letterSpacing:'0.04em',marginBottom:16}}>VISITOR PRE-APPROVED</div>
          <div ref={qrRef} style={{display:'flex',justifyContent:'center',marginBottom:16}}></div>
          <div style={{fontSize:11,color:'#a89a92',marginBottom:8}}>Scan this QR code at the gate</div>
          <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a',marginBottom:4}}>{qrData && qrData.permit}</div>
          <div style={{fontSize:12,color:'#6b5d52',marginBottom:4}}>{qrData && qrData.visitor}</div>
          <div style={{fontSize:11,color:'#a89a92'}}>{qrData && qrData.type} · {qrData && qrData.date} · {qrData && qrData.time}</div>
          {qrData && qrData.repeater && qrData.repeater !== 'Single Visit' && (
            <div style={{fontSize:11,color:'#5a5470',marginTop:4}}>Multiple Entry — Valid until cancelled</div>
          )}
        </div>

        <button onClick={sharePass} style={{width:'100%',padding:14,background:'#fff',color:'#1a1a1a',border:'1px solid #d5cfc8',borderRadius:6,fontSize:14,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:12,letterSpacing:'0.03em'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
          Share QR Pass
        </button>

        <button onClick={onBack} style={{width:'100%',padding:14,background:'#928989',color:'#fff',border:'none',borderRadius:6,fontSize:14,fontWeight:600,cursor:'pointer',letterSpacing:'0.03em'}}>
          Done
        </button>
      </div>
    );
  }

  // ---- FORM SCREEN ----
  return (
    <div className="res-content" style={{paddingBottom:80}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
        <button onClick={onBack} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#6b5d52'}}>←</button>
        <div>
          <h3 style={{fontSize:18,fontWeight:600,letterSpacing:'-0.01em',margin:0}}>Pre-Approved Request</h3>
          <div style={{fontSize:11,color:'#a89a92',letterSpacing:'0.04em'}}>Create Request</div>
        </div>
      </div>

      {/* Guest Type */}
      <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20,marginBottom:12}}>
        <div style={{fontSize:11,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:10,fontWeight:600}}>Visitor Type *</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {['Resident Guest','Contractor / Worker','Delivery / Courier','Domestic Staff','Service Vendor','Other / Misc.'].map(t => (
            <div key={t} onClick={() => setVisitorType(t)}
              style={{padding:'12px 8px',border: visitorType===t ? '2px solid #1a1a1a' : '1px solid #e0e0e0',
              borderRadius:6,textAlign:'center',cursor:'pointer',background: visitorType===t ? '#faf8f5' : '#fff',
              fontSize:12,fontWeight: visitorType===t ? 600 : 400,color:'#1a1a1a',transition:'all .15s'}}>
              {t}
            </div>
          ))}
        </div>
      </div>

      {/* Entry Type */}
      <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20,marginBottom:12}}>
        <div style={{fontSize:11,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:10,fontWeight:600}}>Entry Type *</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {['Walk-in','Drive In'].map(t => (

              borderRadius:6,textAlign:'center',cursor:'pointer',background: entryType===t ? '#faf8f5' : '#fff',
              fontSize:13,fontWeight: entryType===t ? 600 : 400,transition:'all .15s'}}>
              {t}

          ))}
        </div>
      </div>

      {/* Visitor Identity */}
      <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20,marginBottom:12}}>
        <div style={{fontSize:11,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:14,fontWeight:600}}>Visitor Identity</div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:4,display:'block'}}>Full Name *</label>
          <input value={fullName} onChange={e => setFullName(e.target.value)} placeholder="Enter visitor full name..."
            style={{width:'100%',padding:12,border:'1px solid #ebe7e3',borderRadius:6,fontSize:14,outline:'none',boxSizing:'border-box'}} />
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:4,display:'block'}}>Mobile Number *</label>
          <input value={mobile} onChange={e => setMobile(e.target.value)} placeholder="+971 XX XXX XXXX" type="tel"
            style={{width:'100%',padding:12,border:'1px solid #ebe7e3',borderRadius:6,fontSize:14,outline:'none',boxSizing:'border-box'}} />
        </div>

        {/* ID Document fields removed — collected by Security at the gate for non-Guest visitors */}
      </div>

      {/* Visit Details */}
      <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20,marginBottom:12}}>
        <div style={{fontSize:11,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:14,fontWeight:600}}>Visit Details</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:4,display:'block'}}>Visit Date</label>
            <input type="date" value={visitDate} onChange={e => setVisitDate(e.target.value)}
              style={{width:'100%',padding:12,border:'1px solid #ebe7e3',borderRadius:6,fontSize:13,outline:'none',boxSizing:'border-box'}} />
          </div>
          <div>
            <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:4,display:'block'}}>Visit Time</label>
            <input type="time" value={visitTime} onChange={e => setVisitTime(e.target.value)}
              style={{width:'100%',padding:12,border:'1px solid #ebe7e3',borderRadius:6,fontSize:13,outline:'none',boxSizing:'border-box'}} />
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:8,display:'block'}}>Additional Visitors</label>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={() => setAdditionalVisitors(Math.max(0, additionalVisitors-1))}
              style={{width:40,height:40,border:'1px solid #ebe7e3',borderRadius:6,background:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
            <span style={{fontSize:18,fontWeight:600,minWidth:30,textAlign:'center'}}>{additionalVisitors}</span>
            <button onClick={() => setAdditionalVisitors(additionalVisitors+1)}
              style={{width:40,height:40,border:'1px solid #ebe7e3',borderRadius:6,background:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            <span style={{fontSize:12,color:'#a89a92'}}>Total visitors: {additionalVisitors + 1}</span>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:4,display:'block'}}>Vehicle Number (if any)</label>
          <input value={vehicleNumber} onChange={e => setVehicleNumber(e.target.value)} placeholder="e.g. AD-12345 — leave blank if none"
            style={{width:'100%',padding:12,border:'1px solid #ebe7e3',borderRadius:6,fontSize:14,outline:'none',boxSizing:'border-box'}} />
        </div>

        {/* Repeater */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:8,display:'block'}}>Repeater</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {['Single Visit','Multiple Entry'].map(r => (
              <div key={r} onClick={() => setRepeater(r)}
                style={{padding:'12px 10px',border: repeater===r ? '2px solid #1a1a1a' : '1px solid #e0e0e0',
                borderRadius:6,textAlign:'center',cursor:'pointer',background: repeater===r ? '#faf8f5' : '#fff',
                fontSize:12,fontWeight: repeater===r ? 600 : 400,color:'#1a1a1a',transition:'all .15s'}}>
                {r}
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:'#a89a92',marginTop:8,lineHeight:'1.5'}}>
            {repeater === 'Single Visit' && 'QR code will be valid for one day only (visit date).'}
            {repeater === 'Multiple Entry' && 'QR code will remain valid for multiple entries until you cancel the approval.'}
          </div>
        </div>

        <div>
          <label style={{fontSize:12,color:'#6b5d52',fontWeight:500,marginBottom:4,display:'block'}}>Entry Remarks</label>
          <textarea value={remarks} onChange={e => setRemarks(e.target.value)} placeholder="Add any notes for the guard..."
            rows={3} style={{width:'100%',padding:12,border:'1px solid #ebe7e3',borderRadius:6,fontSize:14,outline:'none',resize:'vertical',boxSizing:'border-box'}} />
        </div>
      </div>

      <button onClick={handleSubmit}
        style={{width:'100%',padding:16,background:'#928989',color:'#fff',border:'none',borderRadius:6,fontSize:15,fontWeight:600,cursor:'pointer',letterSpacing:'0.04em',marginTop:4}}>
        Create Pre-Approved Request
      </button>
    </div>
  );
};

// ==================== RESIDENT APP COMPONENTS ====================
const ResidentApp = ({ onLogout }) => {
  const { data, setData, showToast } = useApp();
  const [currentPage, setCurrentPage] = useState('home');
  const [selectedVisitor, setSelectedVisitor] = useState(null);
  const [showApprovalModal, setShowApprovalModal] = useState(false);
  const [selectedForApproval, setSelectedForApproval] = useState(null);
  const [helpModal, setHelpModal] = useState(null); // 'security' | 'pm' | 'incident' | null
  const [incidentForm, setIncidentForm] = useState({ type: 'Security', location: '', description: '' });
  const [editingVisitor, setEditingVisitor] = useState(null); // holds editable copy of visitor
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [showNotifications, setShowNotifications] = useState(false);
  const [dismissedNotifIds, setDismissedNotifIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem('varspm_dismissed_notifs') || '[]'); } catch(e) { return []; }
  });
  const [resHhTab, setResHhTab] = useState('family');
  const [resHhShowCreate, setResHhShowCreate] = useState(false);
  const [resHhForm, setResHhForm] = useState({ name: '', phone: '', relation: 'Sister', role: 'Maid', schedule: 'Mon to Fri', hours: '9:00 AM to 17:00 PM', allowAccess: false, idDocType: 'Emirates ID', docNumber: '', vehicleNumber: '' });
  const [resHhEditingId, setResHhEditingId] = useState(null); // null = create mode, id = edit mode
  const [resHhViewMember, setResHhViewMember] = useState(null); // member object to view detail + QR
  const [resVisFilter, setResVisFilter] = useState('All');
  const [resVisDateFilter, setResVisDateFilter] = useState('All');
  const [resVisFilterOpen, setResVisFilterOpen] = useState(false);
  const prevVisitorStatesRef = React.useRef({});

  // Track visitor status changes for live notifications
  useEffect(() => {
    const prev = prevVisitorStatesRef.current;
    const now = {};
    (data.visitors || []).forEach(v => {
      now[v.permitRef || v.id] = v.status;
      const prevStatus = prev[v.permitRef || v.id];
      if (prevStatus && prevStatus !== v.status) {
        // Status changed — show toast for security actions
        if (v.status === 'Inside' && prevStatus === 'Scheduled') {
          showToast('✓ ' + v.name + ' has passed security');
        } else if (v.status === 'Rejected') {
          showToast('✕ ' + v.name + ' was rejected by security');
        } else if (v.status === 'On Hold') {
          showToast('⏸ ' + v.name + ' is on hold at security');
        }
      }
    });
    prevVisitorStatesRef.current = now;
  }, [data.visitors]);

  // Build notifications from visitor data + announcements
  const notifications = React.useMemo(() => {
    const notifs = [];
    // Security action notifications — generated from visitor data
    (data.visitors || []).forEach(v => {
      if (v.securityPassedTime) {
        notifs.push({
          id: 'sec-pass-' + (v.permitRef || v.id),
          type: 'security',
          icon: '✓',
          iconBg: '#e0e5db',
          iconColor: '#5a6b4f',
          title: v.name + ' passed security',
          body: 'Admitted at ' + v.securityPassedTime + (v.securityActionDate ? ' on ' + v.securityActionDate : ''),
          time: v.securityPassedTime,
          visitor: v
        });
      }
      if (v.securityRejectTime) {
        notifs.push({
          id: 'sec-rej-' + (v.permitRef || v.id),
          type: 'security',
          icon: '✕',
          iconBg: '#eddbd9',
          iconColor: '#8b4a42',
          title: v.name + ' rejected by security',
          body: 'Rejected at ' + v.securityRejectTime + (v.securityActionDate ? ' on ' + v.securityActionDate : ''),
          time: v.securityRejectTime,
          visitor: v
        });
      }
      if (v.securityHoldTime) {
        notifs.push({
          id: 'sec-hold-' + (v.permitRef || v.id),
          type: 'security',
          icon: '⏸',
          iconBg: '#ebe3d9',
          iconColor: '#7a6040',
          title: v.name + ' on hold at security',
          body: 'Held since ' + v.securityHoldTime + (v.securityActionDate ? ' on ' + v.securityActionDate : ''),
          time: v.securityHoldTime,
          visitor: v
        });
      }
    });
    // Static announcements
    notifs.push({
      id: 'ann-pool', type: 'announcement', icon: '\u25CF', iconBg: '#e0dde5', iconColor: '#5a5470',
      title: 'Pool Maintenance Notice', body: 'Swimming pool closed for maintenance on April 12.', time: '2h ago'
    });
    notifs.push({
      id: 'ann-elevator', type: 'announcement', icon: '\u2014', iconBg: '#f3e5f5', iconColor: '#7b1fa2',
      title: 'Elevator Service', body: 'Elevator servicing Saturday morning.', time: '5h ago'
    });
    return notifs;
  }, [data.visitors]);

  const unreadCount = notifications.filter(n => !dismissedNotifIds.includes(n.id)).length;

  const dismissNotif = (id) => {
    const updated = [...dismissedNotifIds, id];
    setDismissedNotifIds(updated);
    try { localStorage.setItem('varspm_dismissed_notifs', JSON.stringify(updated)); } catch(e) {}
  };

  const clearAllNotifs = () => {
    const allIds = notifications.map(n => n.id);
    setDismissedNotifIds(allIds);
    try { localStorage.setItem('varspm_dismissed_notifs', JSON.stringify(allIds)); } catch(e) {}
  };

  const [showCallSecurity, setShowCallSecurity] = useState(false);

  const handleApproveVisitor = (visitor) => {
    const now = new Date();
    const isFromSecurity = visitor.source === 'security';

    if (isFromSecurity) {
      // Security-originated: update existing visitor entry status from "Awaiting Approval" → "Approved"
      // and update entry log status
      setData(prev => ({
        ...prev,
        visitors: prev.visitors.map(v =>
          v.permitRef === visitor.permitRef
            ? { ...v, status: 'Scheduled', qrPayload: v.qrPayload ? { ...v.qrPayload, status: 'RESIDENT APPROVED' } : v.qrPayload }
            : v
        ),
        entryLog: prev.entryLog.map(e =>
          e.refId === visitor.permitRef
            ? { ...e, status: 'RESIDENT APPROVED' }
            : e
        ),
        pendingApprovals: prev.pendingApprovals.filter(p => p.id !== visitor.id)
      }));
      showToast(visitor.name + ' approved — security notified');
    } else {
      // Resident-originated: create new visitor entry as before
      const permitRef = 'PA-' + Date.now();
      const newVisitor = {
        id: Date.now(),
        name: visitor.name,
        type: visitor.type || 'Resident Guest',
        contact: visitor.calledBy || 'Resident',
        resident: 'Nitin Sharma',
        date: now.toLocaleDateString('en-GB'),
        time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        status: 'Scheduled',
        purpose: visitor.purpose || 'Personal visit',
        permitRef: permitRef,
        repeater: visitor.repeater || 'Single Visit',
        flat: 'B-102',
        qrPayload: {
          permit: permitRef,
          property: 'Sky Tower - The Pinnacle Residences',
          unit: 'B-102',
          resident: 'Nitin Sharma',
          visitor: visitor.name,
          type: visitor.type || 'Resident Guest',
          date: now.toLocaleDateString('en-GB'),
          time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
          validUntil: now.toLocaleDateString('en-GB') + ' 23:59',
          repeater: visitor.repeater || 'Single Visit',
          status: 'PRE-APPROVED'
        }
      };
      setData(prev => ({
        ...prev,
        visitors: [newVisitor, ...prev.visitors],
        pendingApprovals: prev.pendingApprovals.filter(p => p.id !== visitor.id)
      }));
      showToast(visitor.name + ' approved — moved to upcoming visitors');
    }
  };

  const handleRejectVisitor = (visitor) => {
    const isFromSecurity = visitor.source === 'security';
    setData(prev => ({
      ...prev,
      pendingApprovals: prev.pendingApprovals.filter(p => p.id !== visitor.id),
      // If from security, also update visitor + entry log to "Rejected"
      visitors: isFromSecurity
        ? prev.visitors.map(v => v.permitRef === visitor.permitRef ? { ...v, status: 'Rejected' } : v)
        : prev.visitors,
      entryLog: isFromSecurity
        ? prev.entryLog.map(e => e.refId === visitor.permitRef ? { ...e, status: 'REJECTED' } : e)
        : prev.entryLog
    }));
    showToast(visitor.name + ' rejected' + (isFromSecurity ? ' — security notified' : ''));
  };

  const handleConfirmApproval = () => {
    if (selectedForApproval) handleApproveVisitor(selectedForApproval);
    setShowApprovalModal(false);
    setSelectedForApproval(null);
  };

  const viewQrRef = React.useRef(null);

  // QR for saved visitor view — just permit ref
  const getViewQrImgUrl = (permit) => 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(permit || 'UNKNOWN');

  useEffect(() => {
    if (currentPage === 'viewVisitor' && selectedVisitor && selectedVisitor.qrPayload && viewQrRef.current) {
      const sp = selectedVisitor.qrPayload;
      viewQrRef.current.innerHTML = '<img src="' + getViewQrImgUrl(sp.permit) + '" width="280" height="280" style="display:block;margin:0 auto;" crossorigin="anonymous" />';
    }
  }, [currentPage, selectedVisitor]);

                  pc.toBlob((blob) => { resolve(blob); }, 'image/png');
