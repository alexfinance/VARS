const VisitorsPage = () => {
  const { data, setData, showToast } = useApp();
  const [typeFilter, setTypeFilter] = useState('All');
  const [statusFilter, setStatusFilter] = useState('All');
  const [selectedVisitor, setSelectedVisitor] = useState(null);
  const [showManualEntry, setShowManualEntry] = useState(false);
  const [search, setSearch] = useState('');
  const [pmcFormStep, setPmcFormStep] = useState('form');
  const [newVisitor, setNewVisitor] = useState({
    visitorType: 'Resident Guest',
    entryType: 'Walk-in',
    fullName: '',
    mobile: '',
    idDocType: '',
    idDocNumber: '',
    flat: '',
    tower: 'Tower A',
    host: '',
    additionalVisitors: 0,
    vehicle: '',
    notes: '',
    purpose: '',
    repeater: 'Single Visit'
  });

  const types = ['All','Guest','Vendor','Contractor'];
  const statuses = ['All','Inside','Pending','Scheduled','Checked Out'];

  const filtered = data.visitors.filter(v => {
    if (typeFilter !== 'All' && v.type !== typeFilter) return false;
    if (statusFilter !== 'All' && v.status !== statusFilter) return false;
    if (search && !v.name.toLowerCase().includes(search.toLowerCase()) && !v.flat.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const resetPmcVisitorForm = () => {
    setPmcFormStep('form');
    setNewVisitor({
      visitorType: 'Resident Guest', entryType: 'Walk-in', fullName: '', mobile: '',
      idDocType: '', idDocNumber: '', flat: '', tower: 'Tower A', host: '',
      additionalVisitors: 0, vehicle: '', notes: '', purpose: '', repeater: 'Single Visit'
    });
  };

  const validatePmcVisitorForm = () => {
    if (!newVisitor.fullName.trim()) { showToast('Please enter visitor name'); return; }
    if (!newVisitor.mobile.trim()) { showToast('Please enter mobile number'); return; }
    if (!newVisitor.flat.trim()) { showToast('Please enter flat/unit number'); return; }
    if (newVisitor.visitorType !== 'Resident Guest' && !newVisitor.idDocType) { showToast('ID document required for non-guest visitors'); return; }
    setPmcFormStep('review');
  };

  const handleCreateVisitor = () => {
    const timeNow = new Date();
    const timeStr = timeNow.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Dubai' });
    const dateStr = timeNow.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', timeZone: 'Asia/Dubai' });
    const id = data.visitors.length + 1;
    const permitRef = 'VIS-' + timeNow.getFullYear() + '-' + String(id).padStart(4,'0');
    const idDocFull = newVisitor.idDocType ? (newVisitor.idDocType + (newVisitor.idDocNumber ? ': ' + newVisitor.idDocNumber : '')) : '';
    const validUntil = newVisitor.repeater === 'Single Visit' ? (dateStr + ' 23:59') : 'Until cancelled';

    const entry = {
      id, name: newVisitor.fullName.trim(), resident: newVisitor.host.trim() || 'Pending Assignment',
      flat: newVisitor.flat.trim(), contact: newVisitor.mobile.trim(), type: newVisitor.visitorType,
      gate: 'Main Gate', status: 'Pending', time: timeStr, date: dateStr, permitRef,
      duration: newVisitor.repeater === 'Single Visit' ? 'Day pass' : 'Multi-entry',
      qrCode: 'Pending', entryType: newVisitor.entryType, idDoc: idDocFull,
      vehicle: newVisitor.vehicle.trim(), additionalVisitors: newVisitor.additionalVisitors,
      notes: newVisitor.notes.trim(), purpose: newVisitor.purpose.trim() || newVisitor.visitorType + ' visit',
      repeater: newVisitor.repeater, validUntil
    };
    setData(prev => ({...prev, visitors: [entry, ...prev.visitors]}));
    resetPmcVisitorForm();
    setShowManualEntry(false);
    showToast('Visitor entry created successfully!');
  };

  const handleApprove = (v) => {
    setData(prev => ({...prev, visitors: prev.visitors.map(vis => vis.id === v.id ? {...vis, status:'Inside'} : vis)}));
    showToast(`${v.name} approved and checked in`);
  };

  const handleExportExcel = () => {
    exportToExcel(filtered, [
      {header:'Timestamp', key:'date'}, {header:'Time', key:'time'}, {header:'Name', key:'name'},
      {header:'Flat', key:'flat'}, {header:'Contact', key:'contact'}, {header:'Type', key:'type'},
      {header:'Gate', key:'gate'}, {header:'Status', key:'status'}, {header:'Permit Ref', key:'permitRef'},
      {header:'Resident', key:'resident'}, {header:'Duration', key:'duration'}
    ], 'VARS_Visitors_Export');
    showToast('Visitors exported to Excel!');
  };

  const visitorCounts = { Guests: data.visitors.filter(v=>v.type==='Guest'&&v.status==='Inside').length, Vendors: data.visitors.filter(v=>v.type==='Vendor'&&v.status==='Inside').length, Contractors: data.visitors.filter(v=>v.type==='Contractor'&&v.status==='Inside').length };

  return (
    <div>
      <div className="page-header">
        <div><h1>Visitors — Live & Log</h1><div className="subtitle">86 visitors inside · 7 pending approvals</div></div>
        <button className="btn btn-primary" onClick={()=>setShowManualEntry(true)}>✦ Create Request</button>
      </div>

      <div className="kpi-row" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="kpi-card"><div className="label">Guests Inside</div><div style={{display:'flex',alignItems:'baseline',gap:8}}><span className="value">34</span><span style={{fontSize:12,color:'#a89a92'}}>40%</span></div></div>
        <div className="kpi-card"><div className="label">Vendors Inside</div><div style={{display:'flex',alignItems:'baseline',gap:8}}><span className="value">28</span><span style={{fontSize:12,color:'#a89a92'}}>33%</span></div></div>
        <div className="kpi-card"><div className="label">Contractors Inside</div><div style={{display:'flex',alignItems:'baseline',gap:8}}><span className="value">24</span><span style={{fontSize:12,color:'#a89a92'}}>28%</span></div></div>
        <div className="kpi-card"><div className="label">Pending Approval</div><span className="value">7</span></div>
      </div>

      <div className="card">
        <div style={{display:'flex',gap:16,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
          <div className="search-bar" style={{flex:1,maxWidth:400}}>
            <span className="search-icon"><Icon name="search" size={14}/></span>
            <input placeholder="Search by name, flat, type..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <span style={{fontSize:12,color:'#8a7f76',marginRight:4}}>Type:</span>
            {types.map(t => <span key={t} className={`chip ${typeFilter===t?'active':''}`} onClick={()=>setTypeFilter(t)}>{t}</span>)}
          </div>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <span style={{fontSize:12,color:'#8a7f76',marginRight:4}}>Status:</span>
            {statuses.map(s => <span key={s} className={`chip ${statusFilter===s?'active':''}`} onClick={()=>setStatusFilter(s)}>{s}</span>)}
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:13,color:'#8a7f76'}}>{filtered.length} results</span>
          <button className="btn btn-sm" onClick={handleExportExcel}><Icon name="download" size={12}/> Export Excel</button>
        </div>
        <table className="data-table">
          <thead><tr><th>Timestamp</th><th>Name</th><th>Flat</th><th>Contact</th><th>Type</th><th>Gate</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            {filtered.map(v => (
              <tr key={v.id}>
                <td>{v.date} · {v.time}</td>
                <td className="name-cell">{v.name}<span className="sub">{v.resident}</span></td>
                <td>{v.flat}</td><td>{v.contact}</td>
                <td><StatusBadge status={v.type}/></td><td>{v.gate}</td>
                <td><StatusBadge status={v.status}/></td>
                <td>
                  <div style={{display:'flex',gap:4}}>
                    <button className="btn btn-sm" onClick={()=>setSelectedVisitor(v)}><Icon name="eye" size={12}/> View</button>
                    {v.status==='Pending' && <button className="btn btn-sm btn-primary" onClick={()=>handleApprove(v)}><Icon name="check" size={12}/> Approve</button>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <Pagination total={86} pageSize={10} page={1} onPageChange={()=>{}}/>
      </div>

      {selectedVisitor && (
        <div className="modal-overlay" onClick={()=>setSelectedVisitor(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-sub">modal/detail · Visitor Detail</div><h2>Visitor Detail</h2></div>
              <button className="modal-close" onClick={()=>setSelectedVisitor(null)}>×</button>
            </div>
            <div style={{display:'flex',gap:16,marginBottom:20}}>
              <div style={{width:60,height:60,background:'#e8e3de',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#a89a92'}}>Photo</div>
              <div>
                <h3 style={{fontSize:18,fontWeight:600}}>{selectedVisitor.name}</h3>
                <div style={{color:'#8a7f76',fontSize:13}}>{selectedVisitor.contact}</div>
                <div style={{display:'flex',gap:6,marginTop:4}}><StatusBadge status={selectedVisitor.type}/><StatusBadge status={selectedVisitor.status}/></div>
              </div>
            </div>
            <div className="grid-2" style={{marginBottom:16}}>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Flat / Unit</div><div style={{fontWeight:600}}>{selectedVisitor.flat}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Check-in Time</div><div style={{fontWeight:600}}>Today, {selectedVisitor.time}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Resident Name</div><div style={{fontWeight:600}}>{selectedVisitor.resident}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Permit Ref.</div><div style={{fontWeight:600}}>{selectedVisitor.permitRef}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>Expected Duration</div><div style={{fontWeight:600}}>{selectedVisitor.duration}</div></div>
              <div><div style={{fontSize:11,color:'#a89a92'}}>QR Code</div><div style={{fontWeight:600}}>{selectedVisitor.qrCode} ✓</div></div>
            </div>
            <div style={{background:'#f5f2ef',borderRadius:8,padding:24,textAlign:'center',color:'#a89a92',fontSize:12,marginBottom:16}}>QR Code Placeholder</div>
            <div style={{marginBottom:16}}>
              <div style={{fontWeight:600,marginBottom:8}}>Approval History</div>
              <div style={{fontSize:13,color:'#8a7f76'}}>✓ Pre-approved by resident — {selectedVisitor.flat} — 09:00</div>
              <div style={{fontSize:13,color:'#8a7f76'}}>◷ Guard scanned QR — Entry point: Main Gate — {selectedVisitor.time}</div>
            </div>
            <div className="grid-2">
              <button className="btn btn-primary"><Icon name="phone" size={14}/> Call Resident</button>
              <button className="btn">Reject</button>
            </div>
          </div>
        </div>
      )}

      {showManualEntry && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'#f2efec',zIndex:1000,overflowY:'auto'}}>
          <div style={{maxWidth:900,margin:'0 auto',padding:20}}>
            {/* Header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
              <div>
                <h2 style={{fontSize:18,fontWeight:600,color:'#1a1a1a',margin:0}}>Manual Visitor Entry</h2>
                <div style={{fontSize:12,color:'#a89a92',marginTop:2}}>{pmcFormStep === 'form' ? 'Create Entry' : 'Review & Confirm'}</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                {pmcFormStep === 'review' && (
                  <button onClick={() => setPmcFormStep('form')} style={{background:'#fff',color:'#1a1a1a',border:'1px solid #ebe7e3',padding:'8px 20px',borderRadius:4,fontSize:12,cursor:'pointer',fontWeight:500}}>Back to Edit</button>
                )}
                <button onClick={() => { resetPmcVisitorForm(); setShowManualEntry(false); }} style={{background:'#fff',color:'#1a1a1a',border:'1px solid #ebe7e3',padding:'8px 20px',borderRadius:4,fontSize:12,cursor:'pointer',fontWeight:500}}>Cancel</button>
              </div>
            </div>

            {pmcFormStep === 'form' ? (
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                  {/* Section 01 — Visitor Identity */}
                  <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
                      <div style={{fontSize:12,fontWeight:600,color:'#1a1a1a',display:'flex',alignItems:'center',gap:8}}><span style={{background:'#e8e3de',padding:'2px 8px',borderRadius:3,fontSize:10,color:'#a89a92'}}>01</span> VISITOR IDENTITY</div>
                      <span style={{fontSize:10,color:'#1a1a1a',letterSpacing:'0.06em'}}>REQUIRED</span>
                    </div>

                    {/* Visitor Type */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:8}}>Visitor Type *</label>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                        {['Resident Guest','Contractor / Worker','Delivery / Courier','Domestic Staff','Service Vendor','Other / Misc.'].map(t => (
                          <div key={t} onClick={() => setNewVisitor({...newVisitor, visitorType: t, idDocType: t === 'Resident Guest' ? '' : newVisitor.idDocType})}
                            style={{padding:'10px 6px',border: newVisitor.visitorType === t ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitor.visitorType === t ? '#f0f0f0' : 'transparent',fontSize:11,color: newVisitor.visitorType === t ? '#1a1a1a' : '#8a8a8a'}}>
                            {t}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Entry Type */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:8}}>Entry Type *</label>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        {['Walk-in','Drive In'].map(t => (
                          <div key={t} onClick={() => setNewVisitor({...newVisitor, entryType: t})}
                            style={{padding:10,border: newVisitor.entryType === t ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitor.entryType === t ? '#f0f0f0' : 'transparent',fontSize:12,color: newVisitor.entryType === t ? '#1a1a1a' : '#8a8a8a'}}>
                            {t}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Full Name */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Full Name *</label>
                      <input value={newVisitor.fullName} onChange={e => setNewVisitor({...newVisitor, fullName: e.target.value})}
                        placeholder="Enter visitor's full name..."
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>

                    {/* Mobile Number */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Mobile Number *</label>
                      <input value={newVisitor.mobile} onChange={e => setNewVisitor({...newVisitor, mobile: e.target.value})}
                        placeholder="+971 XX XXX XXXX"
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>

                    {/* ID Document Type */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:8}}>
                        ID Document Type {newVisitor.visitorType !== 'Resident Guest' ? '*' : '(Optional)'}
                      </label>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        {['Passport','Emirates ID'].map(t => (
                          <div key={t} onClick={() => setNewVisitor({...newVisitor, idDocType: newVisitor.idDocType === t ? '' : t})}
                            style={{padding:10,border: newVisitor.idDocType === t ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitor.idDocType === t ? '#f0f0f0' : 'transparent',fontSize:12,color: newVisitor.idDocType === t ? '#1a1a1a' : '#8a8a8a'}}>
                            {t}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Document Number */}
                    {newVisitor.idDocType && (
                      <div style={{marginBottom:16}}>
                        <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Document Number {newVisitor.visitorType !== 'Resident Guest' ? '*' : ''}</label>
                        <input value={newVisitor.idDocNumber} onChange={e => setNewVisitor({...newVisitor, idDocNumber: e.target.value})}
                          placeholder="Enter document number..."
                          style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                      </div>
                    )}

                    {/* Purpose */}
                    <div style={{marginBottom:0}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Purpose of Visit</label>
                      <input value={newVisitor.purpose} onChange={e => setNewVisitor({...newVisitor, purpose: e.target.value})}
                        placeholder="e.g. Personal visit, Delivery, Maintenance..."
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>
                  </div>

                  {/* Section 02 — Visit Details */}
                  <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:20}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
                      <div style={{fontSize:12,fontWeight:600,color:'#1a1a1a',display:'flex',alignItems:'center',gap:8}}><span style={{background:'#e8e3de',padding:'2px 8px',borderRadius:3,fontSize:10,color:'#a89a92'}}>02</span> VISIT DETAILS</div>
                      <span style={{fontSize:10,color:'#1a1a1a',letterSpacing:'0.06em'}}>REQUIRED</span>
                    </div>

                    {/* Flat / Unit + Tower */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                      <div>
                        <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Flat / Unit No. *</label>
                        <input value={newVisitor.flat} onChange={e => setNewVisitor({...newVisitor, flat: e.target.value})}
                          placeholder="Select unit..."
                          style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                        <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                          {['A-101','A-202','B-102','B-803','C-501','D-1102'].map(u => (
                            <span key={u} onClick={() => setNewVisitor({...newVisitor, flat: u})}
                              style={{padding:'3px 8px',background: newVisitor.flat === u ? '#1a1a1a' : '#f0f0f0',color: newVisitor.flat === u ? '#fff' : '#8a8a8a',borderRadius:3,fontSize:10,cursor:'pointer',border:'1px solid #d5cfc8'}}>{u}</span>
                          ))}
                        </div>
                      </div>
                      <div>
                        <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Tower / Block</label>
                        <select value={newVisitor.tower} onChange={e => setNewVisitor({...newVisitor, tower: e.target.value})}
                          style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}>
                          <option>Tower A</option><option>Tower B</option><option>Tower C</option><option>Tower D</option>
                        </select>
                      </div>
                    </div>

                    {/* Host / Resident */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Host / Resident Name *</label>
                      <input value={newVisitor.host} onChange={e => setNewVisitor({...newVisitor, host: e.target.value})}
                        placeholder="Auto-populated on unit selection..."
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                    </div>

                    {/* Visit Frequency */}
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:8}}>Visit Frequency</label>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        {['Single Visit','Multiple Entry'].map(r => (
                          <div key={r} onClick={() => setNewVisitor({...newVisitor, repeater: r})}
                            style={{padding:10,border: newVisitor.repeater === r ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:4,textAlign:'center',cursor:'pointer',background: newVisitor.repeater === r ? '#f0f0f0' : 'transparent',fontSize:12,color: newVisitor.repeater === r ? '#1a1a1a' : '#8a8a8a'}}>
                            {r}
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:10,color:'#a89a92',marginTop:4}}>
                        {newVisitor.repeater === 'Single Visit' ? 'Valid for today only' : 'Valid until cancelled by resident'}
                      </div>
                    </div>

                    {/* Additional Visitors + Vehicle */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                      <div>
                        <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Additional Visitors</label>
                        <div style={{display:'flex',alignItems:'center',gap:0}}>
                          <button onClick={() => setNewVisitor({...newVisitor, additionalVisitors: Math.max(0, newVisitor.additionalVisitors - 1)})}
                            style={{width:36,height:36,background:'#fff',border:'1px solid #d5cfc8',borderRadius:'4px 0 0 4px',color:'#1a1a1a',fontSize:16,cursor:'pointer'}}>-</button>
                          <div style={{width:48,height:36,background:'#e8e3de',border:'1px solid #d5cfc8',borderLeft:'none',borderRight:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#1a1a1a',fontSize:14,fontWeight:600}}>{newVisitor.additionalVisitors}</div>
                          <button onClick={() => setNewVisitor({...newVisitor, additionalVisitors: newVisitor.additionalVisitors + 1})}
                            style={{width:36,height:36,background:'#fff',border:'1px solid #d5cfc8',borderRadius:'0 4px 4px 0',color:'#1a1a1a',fontSize:16,cursor:'pointer'}}>+</button>
                        </div>
                        <div style={{fontSize:10,color:'#a89a92',marginTop:4}}>Total visitors: {1 + newVisitor.additionalVisitors}</div>
                      </div>
                      <div>
                        <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Vehicle Number (if any)</label>
                        <input value={newVisitor.vehicle} onChange={e => setNewVisitor({...newVisitor, vehicle: e.target.value})}
                          placeholder="e.g. AB 12345 — leave blank if no"
                          style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                      </div>
                    </div>

                    {/* Notes */}
                    <div>
                      <label style={{fontSize:10,color:'#a89a92',letterSpacing:'0.06em',textTransform:'uppercase',display:'block',marginBottom:6}}>Notes / Remarks</label>
                      <textarea value={newVisitor.notes} onChange={e => setNewVisitor({...newVisitor, notes: e.target.value})}
                        placeholder="Add any observations or notes here..."
                        rows={3}
                        style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none',resize:'vertical',fontFamily:'inherit'}}/>
                    </div>
                  </div>
                </div>

                {/* Review Button */}
                <button onClick={validatePmcVisitorForm}
                  style={{width:'100%',padding:16,background:'#928989',color:'#fff',border:'none',borderRadius:4,fontSize:15,fontWeight:700,cursor:'pointer',marginTop:20,letterSpacing:'0.04em'}}>
                  Review Visitor Entry
                </button>
              </>
            ) : (
              /* REVIEW STEP */
              <div style={{maxWidth:600,margin:'0 auto'}}>
                <div style={{background:'#fff',border:'1px solid #ebe7e3',borderRadius:8,overflow:'hidden',marginBottom:20}}>
                  {/* Review Header */}
                  <div style={{background:'#e8e3de',padding:'16px 20px',borderBottom:'1px solid #d0d0d0'}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <div style={{width:44,height:44,borderRadius:'50%',background:'#928989',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:'#fff'}}>
                        {newVisitor.fullName.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)}
                      </div>
                      <div>
                        <div style={{fontSize:16,fontWeight:600,color:'#1a1a1a'}}>{newVisitor.fullName}</div>
                        <div style={{fontSize:12,color:'#1a1a1a'}}>{newVisitor.visitorType}</div>
                      </div>
                    </div>
                  </div>

                  {/* Review Details */}
                  <div style={{padding:20}}>
                    {[
                      ['Mobile', newVisitor.mobile],
                      ['Entry Type', newVisitor.entryType],
                      ['ID Document', newVisitor.idDocType ? (newVisitor.idDocType + (newVisitor.idDocNumber ? ': ' + newVisitor.idDocNumber : '')) : 'Not provided'],
                      ['Purpose', newVisitor.purpose || newVisitor.visitorType + ' visit'],
                      ['Unit', newVisitor.flat + ' — ' + newVisitor.tower],
                      ['Host / Resident', newVisitor.host || 'Pending Assignment'],
                      ['Visit Frequency', newVisitor.repeater],
                      ['Additional Visitors', newVisitor.additionalVisitors > 0 ? '+' + newVisitor.additionalVisitors + ' (' + (1 + newVisitor.additionalVisitors) + ' total)' : 'None'],
                      ['Vehicle', newVisitor.vehicle || 'No vehicle'],
                      ['Notes', newVisitor.notes || '—']
                    ].map(([label, val], i) => (
                      <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom: i < 9 ? '1px solid #e0e0e0' : 'none'}}>
                        <span style={{fontSize:12,color:'#a89a92'}}>{label}</span>
                        <span style={{fontSize:12,color:'#1a1a1a',fontWeight:500,textAlign:'right',maxWidth:'60%'}}>{val}</span>
                      </div>
                    ))}
                  </div>

                  {/* Status indicator */}
                  <div style={{padding:'12px 20px',background:'#e8e3de',borderTop:'1px solid #d5cfc8',display:'flex',alignItems:'center',gap:8}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></svg>
                    <span style={{fontSize:11,color:'#1a1a1a'}}>This entry will be added to the visitor log as Pending</span>
                  </div>
                </div>

// ==================== ANNOUNCEMENTS PAGE ====================
const AnnouncementsPage = () => {
  const { data, setData, showToast } = useApp();
  const [filter, setFilter] = useState('All');
  const [showComposer, setShowComposer] = useState(false);
  const [composerStep, setComposerStep] = useState(1);
  const [showDelete, setShowDelete] = useState(null);
  const [editingAnn, setEditingAnn] = useState(null);
  const [annForm, setAnnForm] = useState({ title: '', body: '', priority: 'Normal', audience: 'All Residents', publishMode: 'now', ackRequired: false, scheduleDate: '', scheduleTime: '' });

  const resetForm = () => setAnnForm({ title: '', body: '', priority: 'Normal', audience: 'All Residents', publishMode: 'now', ackRequired: false, scheduleDate: '', scheduleTime: '' });

  const liveCount = data.announcements.filter(a => a.status === 'Live').length;
  const scheduledCount = data.announcements.filter(a => a.status === 'Scheduled').length;
  const draftCount = data.announcements.filter(a => a.status === 'Draft').length;
  const sentCount = data.announcements.filter(a => a.status === 'Sent').length;
  const filters = [{label:'All',count:data.announcements.length},{label:'Live',count:liveCount},{label:'Scheduled',count:scheduledCount},{label:'Draft',count:draftCount},{label:'Sent',count:sentCount}];
  const filtered = filter === 'All' ? data.announcements : data.announcements.filter(a => a.status === filter);

  const handlePublish = () => {
    if (!annForm.title.trim()) { showToast('Title is required'); return; }
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Dubai' });
    const dateStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', timeZone: 'Asia/Dubai' });
    const status = annForm.publishMode === 'now' ? 'Live' : annForm.publishMode === 'schedule' ? 'Scheduled' : 'Draft';

    if (editingAnn) {
      setData(prev => ({
        ...prev,
        announcements: prev.announcements.map(a => a.id === editingAnn.id ? {
          ...a, title: annForm.title, audience: annForm.audience, priority: annForm.priority, ackRequired: annForm.ackRequired, status: status, body: annForm.body,
          scheduleDate: annForm.scheduleDate, scheduleTime: annForm.scheduleTime
        } : a)
      }));
      showToast('Announcement updated');
    } else {
      const newAnn = {
        id: Date.now(),
        title: annForm.title,
        body: annForm.body,
        audience: annForm.audience,
        author: 'Hassan Al-PM',
        created: dateStr + ', ' + timeStr,
        status: status,
        priority: annForm.priority,
        ackRequired: annForm.ackRequired,
        delivered: status === 'Live' ? 1240 : 0,
        read: 0,
        acknowledged: 0,
        scheduleDate: annForm.scheduleDate,
        scheduleTime: annForm.scheduleTime
      };
      setData(prev => ({ ...prev, announcements: [newAnn, ...prev.announcements] }));
      showToast('Announcement ' + (status === 'Live' ? 'published — visible to residents now' : status === 'Scheduled' ? 'scheduled for ' + annForm.scheduleDate + ' ' + annForm.scheduleTime : 'saved as draft'));
    }
    setShowComposer(false);
    setEditingAnn(null);
    resetForm();
  };

  const handleDelete = (ann) => {
    setData(prev => ({ ...prev, announcements: prev.announcements.filter(a => a.id !== ann.id) }));
    setShowDelete(null);
    showToast('Announcement deleted');
  };

  const handleEdit = (ann) => {
    setEditingAnn(ann);
    setAnnForm({ title: ann.title, body: ann.body || '', priority: ann.priority, audience: ann.audience, publishMode: ann.status === 'Scheduled' ? 'schedule' : ann.status === 'Draft' ? 'draft' : 'now', ackRequired: ann.ackRequired, scheduleDate: ann.scheduleDate || '', scheduleTime: ann.scheduleTime || '' });
    setComposerStep(1);
    setShowComposer(true);
  };

  // Simple toolbar button
  const ToolBtn = ({ children }) => (
    <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:32,height:32,border:'1px solid #d5cfc8',borderRadius:4,cursor:'pointer',fontSize:13,fontWeight:600,color:'#1a1a1a',background:'#fff'}}>{children}</span>
  );

  return (
    <div>
      <div className="page-header">
        <div><h1>Announcements — Composer & Feed</h1><div className="subtitle">{liveCount} live · {scheduledCount} scheduled · {draftCount} draft · {sentCount} sent</div></div>
        <button className="btn btn-primary" onClick={()=>{resetForm();setEditingAnn(null);setShowComposer(true);setComposerStep(1)}}>+ New Announcement</button>
      </div>
      <div className="filter-row">
        {filters.map(f => <span key={f.label} className={`chip ${filter===f.label?'active':''}`} onClick={()=>setFilter(f.label)}>{f.label} {f.count}</span>)}
      </div>
      {filtered.length === 0 && <div style={{textAlign:'center',color:'#a89a92',padding:40,fontSize:13}}>No announcements in this category.</div>}
      {filtered.map(a => (
        <div key={a.id} className="announcement-card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div className="tags">
                <StatusBadge status={a.status}/>
                {a.priority==='High' && <span style={{fontSize:11,color:'#8a7f76',border:'1px solid #d5cfc8',borderRadius:3,padding:'1px 8px'}}>△ High Priority</span>}
                {a.ackRequired && <span style={{fontSize:11,color:'#8a7f76',border:'1px solid #d5cfc8',borderRadius:3,padding:'1px 8px'}}>Ack Required</span>}
              </div>
              <h3 style={{fontSize:16,fontWeight:600,marginBottom:6}}>{a.title}</h3>
              {a.body && <p style={{fontSize:13,color:'#7a6f66',margin:'4px 0 8px',lineHeight:1.5}}>{a.body}</p>}
              <div className="meta">Audience: <strong>{a.audience}</strong> &nbsp; By: {a.author} &nbsp; Created: {a.created}</div>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0,marginLeft:16}}>
              {a.status !== 'Sent' && a.status !== 'Live' && (
                <button className="btn btn-sm" onClick={()=>handleEdit(a)} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                  <Icon name="edit" size={14}/>
                </button>
              )}
              <button className="btn btn-sm" onClick={()=>setShowDelete(a)} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                <Icon name="trash" size={14}/>
              </button>
            </div>
          </div>
          {(a.delivered > 0 || a.read > 0) && (
            <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap',marginTop:16,paddingTop:16,borderTop:'1px solid #f0f0f0'}}>
              <div><div style={{fontSize:10,color:'#a89a92',letterSpacing:'0.04em'}}>Delivered</div><div style={{fontWeight:600,fontSize:14}}>{a.delivered.toLocaleString()}</div></div>
              <div><div style={{fontSize:10,color:'#a89a92',letterSpacing:'0.04em'}}>Read</div><div style={{fontWeight:600,fontSize:14}}>{a.read.toLocaleString()}</div></div>
              {a.acknowledged > 0 && <div><div style={{fontSize:10,color:'#a89a92',letterSpacing:'0.04em'}}>Acknowledged</div><div style={{fontWeight:600,fontSize:14}}>{a.acknowledged.toLocaleString()}</div></div>}
              {a.read > 0 && a.delivered > 0 && <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:120}}>
                <div className="progress-bar"><div className="fill" style={{width:`${Math.round(a.read/a.delivered*100)}%`}}/></div>
                <span style={{fontSize:11,color:'#a89a92'}}>{Math.round(a.read/a.delivered*100)}% read rate</span>
              </div>}
              <span style={{fontSize:11,color:'#a89a92'}}>Audit: {a.author} · {a.created}</span>
            </div>
          )}
        </div>
      ))}

      {/* API endpoint info */}
      <div style={{textAlign:'right',fontSize:11,color:'#c4b8b0',marginTop:8,padding:'0 4px'}}>
        API: /api/announcements · /api/announcements/:id/receipts
      </div>

      {/* Composer Modal */}
      {showComposer && (
        <div className="modal-overlay" onClick={()=>{setShowComposer(false);setEditingAnn(null)}}>
          <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header" style={{marginBottom:4}}>
              <div><div className="modal-sub">modal/composer · Announcement Composer</div><h2 style={{fontSize:18}}>{editingAnn ? 'Edit Announcement' : 'New Announcement'}</h2></div>
              <button className="modal-close" onClick={()=>{setShowComposer(false);setEditingAnn(null)}}>×</button>
            </div>

            {/* Wizard Steps — pill style matching Figma */}
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:24,fontSize:12}}>
              {['Compose','Audience','Schedule','Preview'].map((s,i) => {
                const stepNum = i + 1;
                const isActive = composerStep === stepNum;
                const isCompleted = composerStep > stepNum;
                const circled = ['\u2460','\u2461','\u2462','\u2463'][i];
                return (
                  <React.Fragment key={s}>
                    {i > 0 && <span style={{color:'#d0d0d0',fontSize:11}}>›</span>}
                    <span onClick={() => { if (isCompleted || isActive) setComposerStep(stepNum); }}
                      style={{padding:'6px 14px',borderRadius:20,cursor: isActive || isCompleted ? 'pointer' : 'default',fontWeight: isActive ? 600 : 400,
                        background: isActive ? '#1a1a1a' : 'transparent',
                        color: isActive ? '#fff' : isCompleted ? '#1a1a1a' : '#8a8a8a',
                        border: isActive ? 'none' : '1px solid transparent',fontSize:12,letterSpacing:'0.02em',whiteSpace:'nowrap'}}>
                      {circled} {s}
                    </span>
                  </React.Fragment>
                );
              })}
            </div>

            {/* Step 1: Compose */}
            {composerStep===1 && (<div>
              <div style={{marginBottom:20}}>
                <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'#1a1a1a',display:'block',marginBottom:8}}>Title *</label>
                <input className="form-input" placeholder="Announcement title" value={annForm.title} onChange={e => setAnnForm(p => ({...p, title: e.target.value}))} style={{padding:'12px 14px',fontSize:13}}/>
              </div>
              <div style={{marginBottom:20}}>
                <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'#1a1a1a',display:'block',marginBottom:8}}>Body</label>
                {/* Rich text toolbar */}
                <div style={{display:'flex',gap:4,marginBottom:8}}>
                  <ToolBtn>B</ToolBtn>
                  <ToolBtn><em>I</em></ToolBtn>
                  <ToolBtn><u>U</u></ToolBtn>
                  <ToolBtn>• List</ToolBtn>
                  <ToolBtn>Link</ToolBtn>
                </div>
                <textarea className="form-input" rows={4} placeholder="Write your announcement here..." value={annForm.body} onChange={e => setAnnForm(p => ({...p, body: e.target.value}))} style={{resize:'vertical',padding:'12px 14px',fontSize:13}}/>
              </div>
              <div style={{marginBottom:20}}>
                <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'#1a1a1a',display:'block',marginBottom:8}}>Priority</label>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <div onClick={() => setAnnForm(p => ({...p, priority:'Normal'}))}
                    style={{padding:'12px 16px',textAlign:'center',border: annForm.priority==='Normal' ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:8,cursor:'pointer',background: annForm.priority==='Normal' ? '#1a1a1a' : '#fff',color: annForm.priority==='Normal' ? '#fff' : '#1a1a1a',fontWeight:600,fontSize:13}}>
                    Normal
                  </div>
                  <div onClick={() => setAnnForm(p => ({...p, priority:'High'}))}
                    style={{padding:'12px 16px',textAlign:'center',border: annForm.priority==='High' ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:8,cursor:'pointer',background: annForm.priority==='High' ? '#1a1a1a' : '#fff',color: annForm.priority==='High' ? '#fff' : '#1a1a1a',fontWeight:600,fontSize:13}}>
                    △ High
                  </div>
                </div>
              </div>
              <div style={{marginBottom:20}}>
                <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'#1a1a1a',display:'block',marginBottom:8}}>Attachment</label>
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',border:'1px solid #ebe7e3',borderRadius:8,background:'#fff'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a8a" strokeWidth="1.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                  <span style={{color:'#a89a92',fontSize:12}}>Upload image or document<br/>JPG, PNG, PDF up to 10MB</span>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'#1a1a1a'}}>Acknowledgement Required</div>
                  <div style={{fontSize:11,color:'#a89a92'}}>Residents must confirm they've read this</div>
                </div>
                <Toggle value={annForm.ackRequired} onChange={() => setAnnForm(p => ({...p, ackRequired: !p.ackRequired}))}/>
              </div>
              <button className="btn btn-primary" style={{width:'100%',padding:'14px 0',fontSize:14,fontWeight:600,borderRadius:8}} onClick={()=>setComposerStep(2)}>Continue to Audience →</button>
            </div>)}

            {/* Step 2: Audience */}
            {composerStep===2 && (<div>
              <p style={{color:'#a89a92',marginBottom:16,fontSize:13}}>Select who should receive this announcement.</p>
              {[
                {label:'All Residents',sub:'1,240 recipients',val:'All Residents'},
                {label:'All Residents + Guards',sub:'1,258 recipients',val:'All Residents + Guards'},
                {label:'Specific Buildings',sub:'Tower A, B, C, D',val:'Specific Buildings'},
                {label:'Specific Flats',sub:'Select individual units',val:'Specific Flats'},
                {label:'Security Guards',sub:'18 guards on duty',val:'Security Guards'},
                {label:'Owners Only',sub:'Property owners',val:'Owners Only'}
              ].map((a,i) => (
                <div key={i} onClick={() => setAnnForm(p => ({...p, audience: a.val}))}
                  style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,cursor:'pointer',background: annForm.audience===a.val ? '#f5f5f5' : '#fff',borderRadius:6,padding:'12px 14px',border: annForm.audience===a.val ? '1.5px solid #1a1a1a' : '1px solid #e0e0e0',transition:'all 0.15s'}}>
                  <div style={{width:34,height:34,background: annForm.audience===a.val ? '#1a1a1a' : '#f0f0f0',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={annForm.audience===a.val ? '#fff' : '#8a8a8a'} strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight: annForm.audience===a.val ? 600 : 400,color:'#1a1a1a'}}>{a.label}</div>
                    <div style={{fontSize:11,color:'#a89a92'}}>{a.sub}</div>
                  </div>
                  {annForm.audience===a.val && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>}
                </div>
              ))}
              <div className="grid-2" style={{marginTop:20}}>
                <button className="btn" onClick={()=>setComposerStep(1)}>← Back</button>
                <button className="btn btn-primary" onClick={()=>setComposerStep(3)}>Continue to Schedule →</button>
              </div>
            </div>)}

            {/* Step 3: Schedule */}
            {composerStep===3 && (<div>
              <p style={{color:'#a89a92',marginBottom:16,fontSize:13}}>Choose when to publish this announcement.</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
                {[
                  {key:'now',label:'Publish Now',sub:'Send immediately'},
                  {key:'schedule',label:'Schedule',sub:'Set a future time'},
                  {key:'draft',label:'Save Draft',sub:'Edit later'}
                ].map(opt => (
                  <div key={opt.key} onClick={() => setAnnForm(p => ({...p, publishMode: opt.key}))}
                    style={{padding:'16px 12px',textAlign:'center',border: annForm.publishMode===opt.key ? '1.5px solid #1a1a1a' : '1px solid #d0d0d0',borderRadius:6,cursor:'pointer',
                      background: annForm.publishMode===opt.key ? '#1a1a1a' : '#fff',
                      color: annForm.publishMode===opt.key ? '#fff' : '#1a1a1a',transition:'all 0.15s'}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{opt.label}</div>
                    <div style={{fontSize:11,opacity:0.7}}>{opt.sub}</div>
                  </div>
                ))}
              </div>

              {/* Schedule Date/Time picker — only shown when Schedule is selected */}
              {annForm.publishMode === 'schedule' && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16,padding:16,background:'#f2efec',borderRadius:6,border:'1px solid #ebe7e3'}}>
                  <div>
                    <label style={{fontSize:11,color:'#a89a92',letterSpacing:'0.04em',textTransform:'uppercase',display:'block',marginBottom:6}}>Date</label>
                    <input type="date" value={annForm.scheduleDate} onChange={e => setAnnForm(p => ({...p, scheduleDate: e.target.value}))}
                      style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:'#a89a92',letterSpacing:'0.04em',textTransform:'uppercase',display:'block',marginBottom:6}}>Time</label>
                    <input type="time" value={annForm.scheduleTime} onChange={e => setAnnForm(p => ({...p, scheduleTime: e.target.value}))}
                      style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1px solid #d5cfc8',borderRadius:4,color:'#1a1a1a',fontSize:13,boxSizing:'border-box',outline:'none'}}/>
                  </div>
                </div>
              )}

              <div className="grid-2" style={{marginTop:16}}>
                <button className="btn" onClick={()=>setComposerStep(2)}>← Back</button>
                <button className="btn btn-primary" onClick={()=>setComposerStep(4)}>Preview →</button>
              </div>
            </div>)}

            {/* Step 4: Preview */}
            {composerStep===4 && (<div>
              <div style={{background:'#f2efec',borderRadius:8,padding:20,marginBottom:20}}>
                <div style={{display:'flex',gap:6,marginBottom:8}}>
                  <StatusBadge status={annForm.publishMode==='now'?'Live':annForm.publishMode==='schedule'?'Scheduled':'Draft'}/>
                  {annForm.priority==='High' && <span style={{fontSize:11,border:'1px solid #d5cfc8',borderRadius:3,padding:'1px 8px',background:'#fff'}}>△ High Priority</span>}
                  {annForm.ackRequired && <span style={{fontSize:11,border:'1px solid #d5cfc8',borderRadius:3,padding:'1px 8px',background:'#fff'}}>Ack Required</span>}
                </div>
                <div style={{fontWeight:600,fontSize:15,marginBottom:4}}>{annForm.title || '[Untitled]'}</div>
                {annForm.body && <p style={{fontSize:13,color:'#7a6f66',margin:'0 0 8px',lineHeight:1.5}}>{annForm.body}</p>}
                <div style={{fontSize:12,color:'#a89a92'}}>Audience: {annForm.audience}</div>
                {annForm.publishMode === 'schedule' && annForm.scheduleDate && (
                  <div style={{fontSize:12,color:'#a89a92'}}>Scheduled: {annForm.scheduleDate} at {annForm.scheduleTime || '—'}</div>
                )}
                {annForm.ackRequired && <div style={{fontSize:12,color:'#a89a92'}}>Acknowledgement required</div>}
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13,marginBottom:20,background:'#fff',border:'1px solid #ebe7e3',borderRadius:6,padding:16}}>
                <div><span style={{color:'#a89a92'}}>Audience:</span> <strong>{annForm.audience}</strong></div>
                <div><span style={{color:'#a89a92'}}>Priority:</span> <strong>{annForm.priority}</strong></div>
                <div><span style={{color:'#a89a92'}}>Publish:</span> <strong>{annForm.publishMode==='now'?'Immediately':annForm.publishMode==='schedule'?'Scheduled':'Draft'}</strong></div>
                <div><span style={{color:'#a89a92'}}>Acknowledgement:</span> <strong>{annForm.ackRequired ? 'Required' : 'Not required'}</strong></div>
              </div>

              {/* Data persistence notice */}
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#f2efec',borderRadius:6,marginBottom:20,border:'1px solid #ebe7e3'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></svg>
                <span style={{fontSize:11,color:'#1a1a1a'}}>
                  {annForm.publishMode === 'now' ? 'Will be saved to database and visible to residents immediately' :
                   annForm.publishMode === 'schedule' ? 'Will be saved to database and published at scheduled time' :
                   'Will be saved to database as draft'}
                </span>
              </div>

              <div className="grid-2">
                <button className="btn" onClick={()=>setComposerStep(3)}>← Back</button>
                <button className="btn btn-primary" style={{fontWeight:600}} onClick={handlePublish}>
                  {annForm.publishMode==='now' ? 'Publish Now' : annForm.publishMode==='schedule' ? 'Schedule' : 'Save Draft'}
                </button>
              </div>
            </div>)}
          </div>
        </div>
      )}

      {/* Delete Confirmation */}
      {showDelete && (
        <div className="modal-overlay" onClick={()=>setShowDelete(null)}>
          <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <h2 style={{marginBottom:8,fontSize:16}}>Delete Announcement</h2>
            <p style={{color:'#8a7f76',marginBottom:20,fontSize:13}}>Are you sure you want to delete "{showDelete.title}"? This action cannot be undone.</p>
            <div className="grid-2">
              <button className="btn btn-primary" onClick={()=>handleDelete(showDelete)}>Delete</button>
              <button className="btn" onClick={()=>setShowDelete(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ==================== GUARDS PAGE ====================
const GuardsPage = ({ searchSelectedItem, clearSearchSelection }) => {
  const { data, setData, showToast } = useApp();
  const [selectedGuard, setSelectedGuard] = useState(null);
  const [showAddGuard, setShowAddGuard] = useState(false);
  const [addStep, setAddStep] = useState(1);
  const [showDeactivate, setShowDeactivate] = useState(null);
  const [showCallPopup, setShowCallPopup] = useState(null);
  const [showChatPanel, setShowChatPanel] = useState(false);
  const [chatInput, setChatInput] = useState('');
  const [showDocViewer, setShowDocViewer] = useState(null);
  const [currentPage, setCurrentPage] = useState(1);
  const [editingGuard, setEditingGuard] = useState(null); // holds editable copy
  const pageSize = 10;
  const fileInputRef = useRef(null);
  const dropZoneRef = useRef(null);
  const profileUploadRef = useRef(null);

  // Add Guard form state — documents now store {name, size, type, dataUrl}
  const [addGuardForm, setAddGuardForm] = useState({
    fullName: '',
    company: '',
    contact: '',
    gate: '',
    shift: '',
    accessTimes: '',
    documents: []
  });

  const handleFileSelect = (files) => {
    const fileArray = Array.from(files);
    const readers = fileArray.map(file => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          resolve({ name: file.name, size: (file.size / 1024 / 1024).toFixed(1) + ' MB', type: file.name.split('.').pop().toLowerCase(), dataUrl: e.target.result });
        };
        reader.readAsDataURL(file);
      });
    });
    Promise.all(readers).then(newDocs => {
      setAddGuardForm(prev => ({ ...prev, documents: [...prev.documents, ...newDocs] }));
    });
  };

  const handleRemoveDoc = (idx) => {
    setAddGuardForm(prev => ({ ...prev, documents: prev.documents.filter((_, i) => i !== idx) }));
  };

  const handleStartEdit = () => {
    setEditingGuard({ ...selectedGuard });
  };

  const handleSaveEdit = () => {
    setData(prev => ({ ...prev, guards: prev.guards.map(g => g.id === editingGuard.id ? editingGuard : g) }));
    setSelectedGuard(editingGuard);
    setEditingGuard(null);
    showToast('Guard profile updated!');
  };

  const handleProfileDocUpload = (files) => {
    if (!selectedGuard) return;
    const fileArray = Array.from(files);
    const readers = fileArray.map(file => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          resolve({
            id: `DOC-${String(data.documents.length + Math.random() * 1000 | 0).padStart(3, '0')}`,
            name: `${selectedGuard.name} — ${file.name}`,
            type: file.name.split('.').pop().toLowerCase(),
            owner: selectedGuard.id,
            ownerName: selectedGuard.name,
            category: 'guard',
            size: (file.size / 1024 / 1024).toFixed(1) + ' MB',
            uploadedAt: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
            status: 'pending',
            dataUrl: e.target.result
          });
        };
        reader.readAsDataURL(file);
      });
    });
    Promise.all(readers).then(newDocs => {
      setData(prev => ({ ...prev, documents: [...prev.documents, ...newDocs] }));
      showToast(`${newDocs.length} document${newDocs.length > 1 ? 's' : ''} uploaded!`);
    });
  };

  // Open guard profile from search
  useEffect(() => {
    if (searchSelectedItem && searchSelectedItem.type === 'Guard' && searchSelectedItem.sourceData) {
      const guard = data.guards.find(g => g.id === searchSelectedItem.sourceData.id);
      if (guard) setSelectedGuard(guard);
      if (clearSearchSelection) clearSearchSelection();
    }
  }, [searchSelectedItem]);

  const onDuty = data.guards.filter(g => g.status === 'On Duty');
  const totalGuards = data.guards.length;
  const onDutyCount = onDuty.length;
  const verifiedCount = data.guards.filter(g => g.verified).length;

  // Shift overview calculations
  const shiftBreakdown = {
    'Morning': data.guards.filter(g => g.shift === 'Morning' && g.status === 'On Duty').length,
    'Afternoon': data.guards.filter(g => g.shift === 'Afternoon' && g.status === 'On Duty').length,
    'Night': data.guards.filter(g => g.shift === 'Night' && g.status === 'On Duty').length
  };

  // Documents for selected guard
  const guardDocuments = selectedGuard ? data.documents.filter(doc => doc.owner === selectedGuard.id || doc.guardId === selectedGuard.id) : [];

  // Messages for selected guard
  const guardMessages = selectedGuard ? (data.chatMessages || []).filter(msg => msg.guardId === selectedGuard.id).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)) : [];

  const handleSendMessage = () => {
    if (!chatInput.trim() || !selectedGuard) return;
    const newMessage = {
      id: `msg-${Date.now()}`,
      from: 'PMC',
      to: selectedGuard.id,
      guardId: selectedGuard.id,
      text: chatInput,
      timestamp: new Date().toISOString(),
      senderName: 'PMC User'
    };
    setData({
      ...data,
      chatMessages: [...(data.chatMessages || []), newMessage]
    });
    setChatInput('');
  };

  const handleDeactivateGuard = () => {
    const updated = data.guards.filter(g => g.id !== showDeactivate.id);
    setData({ ...data, guards: updated });
    setSelectedGuard(null);
    setShowDeactivate(null);
    showToast(`Guard ${showDeactivate.name} has been deactivated`);
  };

  const handleAddGuardCreate = () => {
    if (!addGuardForm.fullName || !addGuardForm.company || !addGuardForm.contact || !addGuardForm.gate || !addGuardForm.shift) {
      showToast('Please complete all required fields');
      return;
    }
    const newGuardId = `GRD-${String(data.guards.length + 1).padStart(3, '0')}`;
    const newGuard = {
      id: newGuardId,
      name: addGuardForm.fullName,
      shift: addGuardForm.shift,
      shiftTime: addGuardForm.shift === 'Morning' ? '06:00–14:00' : addGuardForm.shift === 'Afternoon' ? '14:00–22:00' : '22:00–06:00',
      gate: addGuardForm.gate,
      company: addGuardForm.company,
      contact: addGuardForm.contact,
      status: 'Off Duty',
      verified: false
    };
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    const newDocs = addGuardForm.documents.map((doc, idx) => ({
      id: `DOC-${String(data.documents.length + idx + 1).padStart(3, '0')}`,
      name: `${addGuardForm.fullName} — ${doc.name}`,
      type: doc.type || 'pdf',
      owner: newGuardId,
      ownerName: addGuardForm.fullName,
      category: 'guard',
      size: doc.size || '1.0 MB',
      uploadedAt: dateStr,
      status: 'pending',
      dataUrl: doc.dataUrl || null
    }));
    setData({
      ...data,
      guards: [...data.guards, newGuard],
      documents: [...data.documents, ...newDocs]
    });
    setShowAddGuard(false);
    setAddStep(1);
    setAddGuardForm({ fullName: '', company: '', contact: '', gate: '', shift: '', accessTimes: '', documents: [] });
    showToast('Guard profile created!');
  };

  const paginatedGuards = data.guards.slice((currentPage - 1) * pageSize, currentPage * pageSize);

  return (
    <div>
      {/* Header */}
      <div className="page-header">
        <div>
          <h1>Managed Guards</h1>
          <div className="subtitle">{totalGuards} guards registered · {onDutyCount} on duty · {totalGuards - verifiedCount} pending verification</div>
        </div>
        <button className="btn btn-primary" onClick={() => { setShowAddGuard(true); setAddStep(1); }}>+ Add Guard</button>
      </div>

      {/* Currently On Duty */}
      <div className="card">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <h3>Currently On Duty <span style={{ background: '#f0f0f0', padding: '2px 8px', borderRadius: 4, fontSize: 11, marginLeft: 8 }}>{onDuty.length} active</span></h3>
        </div>
        <div className="guard-carousel">
          {onDuty.map(g => (
            <div key={g.id} className="guard-chip" style={{ cursor: 'pointer' }} onClick={() => setSelectedGuard(g)}>
              <div className="avatar-sm"><Icon name="user" size={14} /></div>
              <div>
                <div style={{ fontWeight: 500, fontSize: 13 }}>{g.name}</div>
                <div style={{ fontSize: 11, color: '#888' }}>{g.shift === 'Morning' ? 'Senior Guard' : 'Gate Captain'} · {g.gate}</div>
              </div>
              <button className="btn btn-sm" style={{ marginLeft: 'auto' }} onClick={(e) => { e.stopPropagation(); setShowCallPopup(g); }}><Icon name="phone" size={12} /></button>
            </div>
          ))}
        </div>
      </div>

      {/* KPI Cards */}
      <div className="kpi-row" style={{ gridTemplateColumns: 'repeat(3,1fr)' }}>
        <div className="kpi-card"><div className="label">Total Guards</div><span className="value">{totalGuards}</span></div>
        <div className="kpi-card"><div className="label">On Duty</div><span className="value">{onDutyCount}</span></div>
        <div className="kpi-card"><div className="label">Verified</div><span className="value">{verifiedCount}</span></div>
      </div>

      {/* Two-column layout: Guard Roster + Shift Overview */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 220px', gap: 12 }}>
        {/* Guard Roster Table */}
        <div className="card" style={{ overflow: 'hidden' }}>
          <div className="card-header"><h3>Guard Roster</h3><button className="btn btn-sm"><Icon name="filter" size={12} /> Filter by Shift</button></div>
          <div style={{ overflowX: 'auto' }}>
            <table className="data-table" style={{ fontSize: 12, whiteSpace: 'nowrap' }}>
              <thead>
                <tr><th style={{minWidth:120}}>Name</th><th style={{minWidth:90}}>Shift</th><th>Gate / Post</th><th>Company</th><th>Contact</th><th>Status</th><th>Verified</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {paginatedGuards.map(g => (
                  <tr key={g.id}>
                    <td><div style={{ display: 'flex', alignItems: 'center', gap: 6 }}><div className="avatar-sm" style={{ width: 24, height: 24, flexShrink: 0 }}><Icon name="user" size={10} /></div><div><div style={{fontWeight:500,fontSize:12}}>{g.name}</div><div style={{fontSize:10,color:'#a89a92'}}>{g.id}</div></div></div></td>
                    <td><div style={{fontSize:12}}>{g.shift}</div><div style={{fontSize:10,color:'#a89a92'}}>{g.shiftTime}</div></td>
                    <td style={{fontSize:12}}>{g.gate}</td>
                    <td style={{fontSize:12}}>{g.company}</td>
                    <td style={{fontSize:11}}>{g.contact}</td>
                    <td><StatusBadge status={g.status} /></td>
                    <td>{g.verified ? <span className="status verified" style={{fontSize:11}}>✓ Verified</span> : <StatusBadge status="Pending" />}</td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-sm" style={{fontSize:11,padding:'4px 10px'}} onClick={() => setSelectedGuard(g)}>Profile</button>
                        <button className="btn btn-sm" style={{fontSize:11,padding:'4px 8px'}} onClick={() => setShowDeactivate(g)}>⋯</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <Pagination total={totalGuards} pageSize={pageSize} page={currentPage} onPageChange={setCurrentPage} />
        </div>

        {/* Shift Overview Panel */}
        <div className="card" style={{ padding: 14 }}>
          <h4 style={{ marginBottom: 12, fontSize: 13, fontWeight: 600 }}>Shift Overview</h4>
          {['Morning', 'Afternoon', 'Night'].map(shift => {
            const shiftTime = shift === 'Morning' ? '06:00–14:00' : shift === 'Afternoon' ? '14:00–22:00' : '22:00–06:00';
            const shiftGuards = data.guards.filter(g => g.shift === shift);
            const onDutyNames = shiftGuards.filter(g => g.status === 'On Duty').map(g => g.gate);
            return (
              <div key={shift} style={{ marginBottom: 10, padding: '10px 12px', background: '#f9f9f9', borderRadius: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 2 }}>{shift} {shiftTime}</div>
                <div style={{ fontSize: 10, color: '#888' }}>{onDutyNames.length > 0 ? onDutyNames.join(', ') : 'No guards on duty'}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Guard Profile Modal */}
      {selectedGuard && (
        <div className="modal-overlay" onClick={() => { setSelectedGuard(null); setShowChatPanel(false); setEditingGuard(null); }}>
          <div className="modal" style={{ maxWidth: 600 }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-sub">modal/guard/profile · Guard Tablet Profile</div><h2>Guard Profile</h2></div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                {!editingGuard && !showChatPanel && <button className="btn btn-sm" onClick={handleStartEdit}><Icon name="edit" size={12} /> Edit</button>}
                <button className="modal-close" onClick={() => { setSelectedGuard(null); setShowChatPanel(false); setEditingGuard(null); }}>×</button>
              </div>
            </div>
            <div className="wizard-steps"><span className="wizard-step">① Compose</span><span className="wizard-sep">›</span><span className="wizard-step">② Audience</span><span className="wizard-sep">›</span><span className="wizard-step">③ Schedule</span><span className="wizard-sep">›</span><span className="wizard-step active">④ Preview</span></div>

            <input type="file" ref={profileUploadRef} multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style={{ display: 'none' }}
              onChange={(e) => { if (e.target.files.length > 0) handleProfileDocUpload(e.target.files); e.target.value = ''; }} />

            {!showChatPanel ? (
              <div>
                {/* Guard Info */}
                {editingGuard ? (
                  <div style={{ marginBottom: 20 }}>
                    <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Full Name</label><input className="form-input" value={editingGuard.name} onChange={e => setEditingGuard({ ...editingGuard, name: e.target.value })} /></div>
                    <div className="grid-2" style={{ gap: 10 }}>
                      <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Company</label><input className="form-input" value={editingGuard.company} onChange={e => setEditingGuard({ ...editingGuard, company: e.target.value })} /></div>
                      <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Contact</label><input className="form-input" value={editingGuard.contact} onChange={e => setEditingGuard({ ...editingGuard, contact: e.target.value })} /></div>
                      <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Gate / Post</label><input className="form-input" value={editingGuard.gate} onChange={e => setEditingGuard({ ...editingGuard, gate: e.target.value })} /></div>
                      <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Shift</label>
                        <select className="form-input" value={editingGuard.shift} onChange={e => setEditingGuard({ ...editingGuard, shift: e.target.value, shiftTime: e.target.value === 'Morning' ? '06:00–14:00' : e.target.value === 'Afternoon' ? '14:00–22:00' : '22:00–06:00' })}>
                          <option value="Morning">Morning</option><option value="Afternoon">Afternoon</option><option value="Night">Night</option>
                        </select>
                      </div>
                      <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Status</label>
                        <select className="form-input" value={editingGuard.status} onChange={e => setEditingGuard({ ...editingGuard, status: e.target.value })}>
                          <option value="On Duty">On Duty</option><option value="Off Duty">Off Duty</option>
                        </select>
                      </div>
                      <div className="form-group" style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: '#888' }}>Verified</label>
                        <select className="form-input" value={editingGuard.verified ? 'yes' : 'no'} onChange={e => setEditingGuard({ ...editingGuard, verified: e.target.value === 'yes' })}>
                          <option value="yes">Verified</option><option value="no">Pending</option>
                        </select>
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                      <button className="btn btn-primary" style={{ flex: 1 }} onClick={handleSaveEdit}>Save Changes</button>
                      <button className="btn" style={{ flex: 1 }} onClick={() => setEditingGuard(null)}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
                      <div style={{ width: 48, height: 48, background: '#f0f0f0', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="user" size={20} /></div>
                      <div><div style={{ fontWeight: 600, fontSize: 16 }}>{selectedGuard.name}</div><div style={{ fontSize: 12, color: '#888' }}>{selectedGuard.id} · {selectedGuard.company}</div><StatusBadge status={selectedGuard.status} /></div>
                    </div>
                    <div className="grid-2" style={{ marginBottom: 16 }}>
                      <div><div style={{ fontSize: 11, color: '#888' }}>Shift</div><div style={{ fontWeight: 600 }}>{selectedGuard.shift} {selectedGuard.shiftTime}</div></div>
                      <div><div style={{ fontSize: 11, color: '#888' }}>Gate / Post</div><div style={{ fontWeight: 600 }}>{selectedGuard.gate}</div></div>
                      <div><div style={{ fontSize: 11, color: '#888' }}>Contact</div><div style={{ fontWeight: 600 }}>{selectedGuard.contact}</div></div>
                      <div><div style={{ fontSize: 11, color: '#888' }}>Verification</div><div style={{ fontWeight: 600 }}>{selectedGuard.verified ? 'Verified ✓' : 'Pending'}</div></div>
                    </div>
                  </div>
                )}

                {/* Security Documents */}
                {!editingGuard && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                      <h4 style={{ fontSize: 13, fontWeight: 600 }}>Security Documents</h4>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <button className="btn btn-sm" onClick={() => profileUploadRef.current && profileUploadRef.current.click()}><Icon name="upload" size={10} /> Upload</button>
                        {guardDocuments.length > 1 && (
                          <button className="btn btn-sm" onClick={() => {
                            guardDocuments.forEach(doc => {
                              if (doc.dataUrl) {
                                const a = document.createElement('a'); a.href = doc.dataUrl; a.download = doc.name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                              }
                            });
                            showToast(`Downloading ${guardDocuments.length} documents...`);
                          }}><Icon name="download" size={10} /> All</button>
                        )}
                      </div>
                    </div>
                    {guardDocuments.length > 0 ? (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 200, overflowY: 'auto' }}>
                        {guardDocuments.map(doc => (
                          <div key={doc.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 12px', background: '#f9f9f9', borderRadius: 6, fontSize: 12 }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{doc.name}</div>
                              <div style={{ color: '#888', fontSize: 10 }}>{doc.type.toUpperCase()} · {doc.size} · {doc.uploadedAt}</div>
                            </div>
                            <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
                              <button className="btn btn-sm" style={{ fontSize: 10, padding: '3px 8px' }} onClick={() => setShowDocViewer(doc)}>View</button>
                              <button className="btn btn-sm" style={{ fontSize: 10, padding: '3px 8px' }} onClick={() => {
                                if (doc.dataUrl) {
                                  const a = document.createElement('a'); a.href = doc.dataUrl; a.download = doc.name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                                  showToast('Download started!');
                                } else { showToast('Sample entry — no file data'); }
                              }}>Download</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div onClick={() => profileUploadRef.current && profileUploadRef.current.click()} style={{ background: '#f9f9f9', borderRadius: 8, padding: 24, textAlign: 'center', color: '#999', fontSize: 12, cursor: 'pointer', border: '2px dashed #e0e0e0' }}>No documents uploaded<br /><span style={{ color: '#1a1a1a', fontWeight: 600 }}>Click to upload files</span></div>
                    )}
                  </div>
                )}

                {/* Action Buttons */}
                {!editingGuard && (
                  <div className="grid-3">
                    <button className="btn" onClick={() => setShowCallPopup(selectedGuard)}><Icon name="phone" size={14} /> Call</button>
                    <button className="btn" onClick={() => setShowChatPanel(true)}>Message</button>
                    <button className="btn btn-danger" onClick={() => setShowDeactivate(selectedGuard)}>Deactivate</button>
                  </div>
                )}
              </div>
            ) : (
              /* Chat Panel */
              <div>
                <h4 style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Message {selectedGuard.name}</h4>
                <div style={{ background: '#f9f9f9', borderRadius: 6, padding: 12, height: 240, overflowY: 'auto', marginBottom: 12 }}>
                  {guardMessages.length > 0 ? (
                    guardMessages.map(msg => (
                      <div key={msg.id} style={{ marginBottom: 12, display: 'flex', justifyContent: msg.from === 'PMC' ? 'flex-end' : 'flex-start' }}>
                        <div style={{ maxWidth: '75%', background: msg.from === 'PMC' ? '#1a1a1a' : '#e8e8e8', color: msg.from === 'PMC' ? '#fff' : '#1a1a1a', padding: '8px 12px', borderRadius: 6, fontSize: 12 }}>
                          {msg.text}
                          <div style={{ fontSize: 10, marginTop: 4, opacity: 0.7 }}>{new Date(msg.timestamp).toLocaleTimeString()}</div>
                        </div>
                      </div>
                    ))
                  ) : (
                    <div style={{ textAlign: 'center', color: '#888', paddingTop: 80 }}>No messages yet</div>
                  )}
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input type="text" className="form-input" placeholder="Type message..." value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendMessage()} style={{ flex: 1 }} />
                  <button className="btn btn-primary" onClick={handleSendMessage}>Send</button>
                </div>
                <button className="btn" style={{ width: '100%', marginTop: 12 }} onClick={() => setShowChatPanel(false)}>← Back to Profile</button>
